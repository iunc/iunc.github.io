<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎲 Roll Dice</title>
<style>

*{
   margin:0;
   padding:0;
   box-sizing:border-box;
   -webkit-tap-highlight-color: transparent;
   user-select:none;
}
body {
    background: radial-gradient(circle, #1e3799, #000000);
    color: white;
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}
.game-container {
    width: 100%;
    max-width: 450px;
    background: rgba(0, 0, 0, 0.8);
    border: 3px solid #f1c40f; 
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
}
.game-title {
    color: #f1c40f;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    font-size: 1.8rem;
    margin-bottom: 20px;
}
.balance-card {
    background: #2c3e50;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 25px;
}
.balance-value {
    font-size: 1.5rem;
    font-weight: bold;
    color: #2ecc71;
}
.dice-wrapper {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 30px 0;
}
.dice {
    width: 70px;
    height: 70px;
    background: white;
    color: #2c3e50;
    border-radius: 12px;
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 -4px 0 #bdc3c7;
}
.bet-grid {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 15px;
    margin-bottom: 25px;
}
.btn-bet {
    padding: 20px;
    font-size: 1.2rem;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
.btn-bet.active{
border:3px solid #fff;
transform:translateY(-3px);
}
.btn-tai { background: #e74c3c; color: white; }
.btn-xiu { background: #3498db; color: white; }
.btn-roll {
    width: 100%;
    padding: 15px;
    font-size: 1.3rem;
    font-weight: bold;
    background: #f1c40f;
    color: #2c3e50;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 0 #d4ac0d;
}
.btn-roll:disabled {
    background: #7f8c8d;
    box-shadow: none;
    cursor: not-allowed;
}
#message {
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 800;
    text-transform: uppercase;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin: 15px 0;
    color: #ecf0f1; 
}
@media (max-width: 380px) {
    .dice { width: 60px; height: 60px; font-size: 1.5rem; }
    .btn-bet { padding: 15px; font-size: 1rem; }
}
.history-section {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px dashed #444;
}
.history-section p {
    font-size: 0.75rem;
    font-weight: 800;
    color: #f1c40f; 
    text-transform: uppercase;
    letter-spacing: 2px; 
    margin-bottom: 12px;
    text-align: center;
}
.dots-container {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap; 
    min-height: 24px;
}
.dot {
    margin-top:10px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: bold;
    color: white;
    font-family: 'Arial Black', sans-serif; 
    box-shadow: inset 0 -2px 5px rgba(0,0,0,0.3); 
}
.dot-tai { background: #e74c3c; } 
.dot-xiu { background: #3498db; }
.dot-triple { background: #f1c40f; color: #000; } 
.bet-group {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-bottom: 20px;
}
.bet-btn {
    background: #2c3e50;
    color: white;
    border: 1px solid #444;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: bold;
    min-width: 45px;
    transition: all 0.2s;
}
.bet-btn.active {
    background: #f1c40f;
    color: #000;
    border-color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(241, 196, 15, 0.4);
}
.bgm-container {
    position: fixed;
    bottom: 10px;
    right: 10px;
    z-index: 9999;
}
#bgmBtn {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: white;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
}
#bgmBtn:active {
    transform: scale(0.9);
}
.is-playing {
    animation: diskRotate 4s linear infinite;
    border-color: #ffd86b !important;
    box-shadow: 0 0 20px rgba(255, 216, 107, 0.4) !important;
}
@keyframes diskRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
#bgmAudio {
    display: none;
}
.soi-cau-container {
    background: rgba(44, 62, 80, 0.8);
    border-radius: 10px;
    padding:10px;
    margin-top: 20px;
    text-align: center;
    border: 1px solid #34495e;
}
.soi-cau-container h3 { 
    color: #bdc3c7; 
    font-size: 18px; 
    margin-bottom: 10px; 
}
#soiCauCanvas {
    border-radius: 5px;
}
.cau-stats {
    color: #f1c40f; 
    font-size: 14px;
    margin-top: 10px;
    font-weight: bold;
}
#soiCauCanvas{
    background:#1a1e22;
    border-radius:5px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    width: 100%;
    height:auto;
}

</style>
</head>

<body>

<div class="game-container">
    <h1 class="game-title">TÀI XỈU ONLINE</h1>
    
    <div class="balance-card">
        <div class="balance-value"><b style="color:white;">Balance:</b>
            <span id="balance">1000</span> <span class="coin-icon">🪙</span>
        </div>
    </div>

    <div class="dice-wrapper">
        <div id="dice-1" class="dice">🎲</div>
        <div id="dice-2" class="dice">🎲</div>
        <div id="dice-3" class="dice">🎲</div>
    </div>

    <div class="bet-grid">
        <button class="btn-bet btn-tai" onclick="choose('Tài',this)">TÀI (11-17)</button>
        <button class="btn-bet btn-xiu" onclick="choose('Xỉu',this)">XỈU (4-10)</button>
    </div>

<div class="bet-section">
    <p style="color: #f1c40f; font-weight: bold; font-size: 0.8rem; margin-bottom: 10px;">MỨC CƯỢC</p>
    <div class="bet-group">
        <button class="bet-btn active" onclick="setBet(10, this)">10</button>
        <button class="bet-btn" onclick="setBet(50, this)">50</button>
        <button class="bet-btn" onclick="setBet(100, this)">100</button>
        <button class="bet-btn" onclick="setBet(500, this)">500</button>
        <button class="bet-btn" onclick="setBet('all', this)" style="color: #ff4757;">ALL</button>
    </div>
</div>

    <div class="action-board">
        <p id="message">Chọn Tài hoặc Xỉu để bắt đầu!</p>
        <button id="roll-btn" class="btn-roll" disabled>QUAY XÚC XẮC</button>
    </div>
 
    <div class="history-section">
    <p>LỊCH SỬ (SOI CẦU)</p>
    <div id="history-dots" class="dots-container">
        </div>
    </div>

    
    <div class="soi-cau-container">
    <h3>BIỂU ĐỒ</h3>
    <canvas id="soiCauCanvas" width="400" height="150"></canvas>
    
    <div id="cau-stats" class="cau-stats">
        Tài: 0% | Xỉu: 0%
    </div>
    </div>

</div>


<div class="bgm-container">
    <button id="bgmBtn" onclick="toggleBGM()" title="Bật/Tắt nhạc nền">
        <span id="bgmIcon">🔊</span>
    </button>
    <audio id="bgmAudio" loop>
        <source src="bgm-numberguess.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfx-dice" src="rolldice.mp3" preload="auto" loop></audio>
    <audio id="sfx-win" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3" preload="auto"></audio>
    <audio id="sfx-lose" src="gameover.mp3" preload="auto"></audio>
</div>

<script>

let userChoose = "";
let currentBet = 10;
let saved = localStorage.getItem("balance")
let balance = (saved !== null) ? Number(saved) : 1000;
let diceHistory = JSON.parse(localStorage.getItem("diceHistory")) || [];


const rollBtn = document.getElementById('roll-btn');
const balanceEl = document.getElementById("balance");
balanceEl.textContent = balance;


function init(){
if(diceHistory.length>0){
let lastResult = diceHistory[diceHistory.length-1];
diceHistory.pop();
addHistory(lastResult);
}
drawSoiCau();
}


function rollDice() {
return Math.floor(Math.random() * 6) + 1;
}


function choose(type,element){
userChoose = type;
let msg = document.getElementById("message");
let btnBet = document.querySelectorAll('.btn-bet');
btnBet.forEach(btn => btn.classList.remove('active'));
element.classList.add('active');
msg.innerText = "Bạn đã chọn: " + type;
msg.style.color = "#ecf0f1"; 
msg.style.textShadow = "none";
document.getElementById('dice-1').innerText = "🎲"; document.getElementById('dice-2').innerText = "🎲"; document.getElementById('dice-3').innerText = "🎲";
rollBtn.disabled = false;
}


rollBtn.addEventListener('click', () => {
if(balance < currentBet) {
let msg = document.getElementById("message");
msg.innerText = "BẠN KHÔNG ĐỦ TIỀN CƯỢC!";
msg.style.color = "#ff4757";
msg.style.textShadow = "0 0 10px #ff4757";
return;
}
rollBtn.disabled = true;
let msg = document.getElementById("message");
msg.innerText = "Đang quay..";
msg.style.color = "#f1c40f";
msg.style.textShadow = "none";
playSFX('sfx-dice');
let count = 0;
let shuffle = setInterval(()=>{
document.getElementById("dice-1").innerText = Math.floor(Math.random()*6) +1;
document.getElementById("dice-2").innerText = Math.floor(Math.random()*6) +1;
document.getElementById("dice-3").innerText = Math.floor(Math.random()*6) +1;
count++;
if(count > 15){
clearInterval(shuffle);
document.getElementById("sfx-dice").pause();
handleRoll();
}
},100);
});


function handleRoll(){
const d1 = rollDice();
const d2 = rollDice();
const d3 = rollDice();
document.getElementById('dice-1').innerText = d1; document.getElementById('dice-2').innerText = d2;   document.getElementById('dice-3').innerText = d3;
const total = d1 + d2 + d3; 
let result = "";
if(d1 === d2 && d2 === d3){
result = "Triple";
} else if(total >= 4 && total <= 10){
result = "Xỉu";
} else result = "Tài";
let msg = document.getElementById("message");
if (result === "Triple") {
msg.innerText = `BỘ BA (${d1}-${d2}-${d3}). NHÀ CÁI ĂN HẾT!`;
playSFX('sfx-lose');
msg.style.color = "#ff4757"; 
msg.style.textShadow = "0 0 15px #ff4757";
balance -= currentBet;
} else if (userChoose === result) {
msg.innerText = `TỔNG ${total} (${result}). BẠN THẮNG!`;
playSFX('sfx-win');
msg.style.color = "#2ed573";
msg.style.textShadow = "0 0 15px #2ed573";
balance += currentBet;
} else {
msg.innerText = `TỔNG ${total} (${result}). BẠN THUA RỒI!`;
playSFX('sfx-lose');
msg.style.color = "#ffa502";
msg.style.textShadow = "0 0 15px #ffa502";
balance -= currentBet;
}
addHistory(result);
drawSoiCau();
saveGame();
}


function addHistory(result) {
diceHistory.push(result);
if(diceHistory.length>10) diceHistory.shift();
const history = document.getElementById('history-dots');
history.innerHTML = "";
diceHistory.forEach(res => {
const dot = document.createElement('div');
dot.classList.add('dot');
if (res === "Tài") {
dot.classList.add('dot-tai');
dot.innerText = "T";
} else if (res === "Xỉu") {
dot.classList.add('dot-xiu');
dot.innerText = "X";
} else {
dot.classList.add('dot-triple');
dot.innerText = "B";
}
history.prepend(dot);
});
}


function setBet(amount,element){
currentBet = amount === 'all' ? balance : amount;
const buttons = document.querySelectorAll('.bet-btn');
buttons.forEach(btn => btn.classList.remove('active'));
element.classList.add('active');
}


function toggleBGM(){
const audio = document.getElementById("bgmAudio");
const btn = document.getElementById("bgmBtn");
const icon = document.getElementById("bgmIcon");
if(audio.paused){
audio.play().then(()=>{
btn.classList.add("is-playing");
icon.textContent = "🔊";
}).catch(()=>{});
} else{
audio.pause();
btn.classList.remove("is-playing");
icon.textContent = "🔇";
}
}


function drawSoiCau(){
const canvas = document.getElementById("soiCauCanvas");
const ctx = canvas.getContext('2d');
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = "#f8f9fa";
ctx.fillRect(0, 0, canvas.width, canvas.height);
let padding = 20;
let startX = padding;
let endX = canvas.width - padding;
let startY = canvas.height - padding;
let endY = padding;
let stepX = 0;
if(diceHistory.length > 1){
stepX = (endX - startX)/(diceHistory.length-1);
}
let reverse =[...diceHistory].reverse();
ctx.beginPath();
reverse.forEach((res,index) => {
let x = startX + index*stepX;
let y = endY;
if(res === "Xỉu") y = startY;
else if(res === "Triple") y = (startY + endY)/2;
if(index===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.strokeStyle = "#3498db";
ctx.lineWidth = 3;
ctx.stroke();
reverse.forEach((res,index) => {
let x = startX + index*stepX;
let y = endY;
if(res === "Xỉu") y = startY;
else if(res === "Triple") y = (endY + startY)/2;
if(res === "Tài") ctx.fillStyle = "#e74c3c";
else if(res === "Xỉu") ctx.fillStyle = "#ecf0f1";
else ctx.fillStyle = "#f1c40f";
ctx.beginPath();
ctx.arc(x,y,6,0,Math.PI*2);
ctx.fill();
ctx.strokeStyle = "#2c3e50";
ctx.lineWidth = 1.5;
ctx.stroke();
});
updateStats();
}



function updateStats(){
let total = diceHistory.length;
let taiCount = diceHistory.filter(x => x==="Tài").length;
let xiuCount = diceHistory.filter(x => x === "Xỉu").length;
let taiPercent = total ? Math.floor((taiCount/total*100)) : 0;
let xiuPercent = total ? Math.floor((xiuCount/total*100)) : 0;
const stats = document.getElementById("cau-stats");
stats.innerHTML = `Tài: ${taiPercent}% | Xỉu: ${xiuPercent}%`;
}


function playSFX(id){
const sfx = document.getElementById(id);
if(sfx){
sfx.currentTime = 0;
sfx.play().catch(() =>{});
}
}


function saveGame(){
localStorage.setItem("balance",balance);
document.getElementById("balance").innerText = balance;
localStorage.setItem("diceHistory",JSON.stringify(diceHistory));
}


document.addEventListener('DOMContentLoaded',init);

</script>
</body>
</html>
