<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎲 Roll Dice</title>
<style>

*{
   margin:0;
   padding:0;
   box-sizing:border-box;
   -webkit-tap-highlight-color: transparent;
}
body {
    background: radial-gradient(circle, #1e3799, #000000);
    color: white;
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}
.game-container {
    width: 100%;
    max-width: 450px;
    background: rgba(0, 0, 0, 0.8);
    border: 3px solid #f1c40f; 
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
}
.game-title {
    color: #f1c40f;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    font-size: 1.8rem;
    margin-bottom: 20px;
}
.balance-card {
    background: #2c3e50;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 25px;
}
.balance-value {
    font-size: 1.5rem;
    font-weight: bold;
    color: #2ecc71;
}
.dice-wrapper {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 30px 0;
}
.dice {
    width: 70px;
    height: 70px;
    background: white;
    color: #2c3e50;
    border-radius: 12px;
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 -4px 0 #bdc3c7;
}
.bet-grid {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 15px;
    margin-bottom: 25px;
}
.btn-bet {
    padding: 20px;
    font-size: 1.2rem;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s;
}
.btn-tai { background: #e74c3c; color: white; }
.btn-xiu { background: #3498db; color: white; }
.btn-bet:active { transform: scale(0.95); } 
.btn-roll {
    width: 100%;
    padding: 15px;
    font-size: 1.3rem;
    font-weight: bold;
    background: #f1c40f;
    color: #2c3e50;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 0 #d4ac0d;
}
.btn-roll:disabled {
    background: #7f8c8d;
    box-shadow: none;
    cursor: not-allowed;
}
#message {
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 800;
    text-transform: uppercase;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin: 15px 0;
    color: #ecf0f1; 
}
.pop-effect {
    transform: scale(1.1);
}
@media (max-width: 380px) {
    .dice { width: 60px; height: 60px; font-size: 1.5rem; }
    .btn-bet { padding: 15px; font-size: 1rem; }
}

</style>
</head>

<body>

<div class="game-container">
    <h1 class="game-title">TÀI XỈU ONLINE</h1>
    
    <div class="balance-card">
        <div class="balance-value"><b style="color:white;">Balance:</b>
            <span id="balance">1000</span> <span class="coin-icon">🪙</span>
        </div>
    </div>

    <div class="dice-wrapper">
        <div id="dice-1" class="dice">?</div>
        <div id="dice-2" class="dice">?</div>
        <div id="dice-3" class="dice">?</div>
    </div>

    <div class="bet-grid">
        <button class="btn-bet btn-tai" onclick="choose('Tài')">TÀI (11-17)</button>
        <button class="btn-bet btn-xiu" onclick="choose('Xỉu')">XỈU (4-10)</button>
    </div>

    <div class="action-board">
        <p id="message">Chọn Tài hoặc Xỉu để bắt đầu!</p>
        <button id="roll-btn" class="btn-roll" disabled>QUAY XÚC XẮC</button>
    </div>
</div>

<script>

const rollBtn = document.getElementById('roll-btn');

let userChoose = "";
let balance = 1000;

function rollDice() {
return Math.floor(Math.random() * 6) + 1;
}

function choose(type){
userChoose = type;
let msg = document.getElementById("message");
msg.innerText = "Bạn đã chọn: " + type;
msg.style.color = "#ecf0f1"; 
msg.style.textShadow = "none";
document.getElementById('dice-1').innerText = "?";
    document.getElementById('dice-2').innerText = "?";
    document.getElementById('dice-3').innerText = "?";
rollBtn.disabled = false;
}

rollBtn.addEventListener('click', () => {
const d1 = rollDice();
const d2 = rollDice();
const d3 = rollDice();
document.getElementById('dice-1').innerText = d1;
    document.getElementById('dice-2').innerText = d2;
    document.getElementById('dice-3').innerText = d3;
const total = d1 + d2 + d3; 
let result = "";
if(d1 === d2 && d2 === d3){
result = "Triple";
} else if(total >= 4 && total <= 10){
result = "Xỉu";
} else result = "Tài";
let msg = document.getElementById("message");
if (result === "Triple") {
msg.innerText = `BỘ BA (${d1}-${d2}-${d3}). NHÀ CÁI ĂN HẾT!`;
msg.style.color = "#ff4757"; 
msg.style.textShadow = "0 0 15px #ff4757";
balance -= 100;
} else if (userChoose === result) {
msg.innerText = `TỔNG ${total} (${result}). BẠN THẮNG!`;
msg.style.color = "#2ed573";
msg.style.textShadow = "0 0 15px #2ed573";
balance += 100;
} else {
msg.innerText = `TỔNG ${total} (${result}). BẠN THUA RỒI!`;
msg.style.color = "#ffa502";
msg.style.textShadow = "0 0 15px #ffa502";
balance -= 100;
}
document.getElementById("balance").innerText = balance;
rollBtn.disabled = true;
});

</script>
</body>
</html>
