<!DOCTYPE html>
<html lang="vi" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">  
<title>Countdown</title>

<style>
*{
box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(160deg,#0b1220,#0f1c3f);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow-y: auto;
}

.header{
  font-family: 'Orbitron', sans-serif;
  text-align:center;
  padding:18px 0;
  font-size:28px;
  font-weight:bold;
  letter-spacing:3px;
  color:#38bdf8;

  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(8px);

  border-bottom:1px solid rgba(56,189,248,0.2);

  text-shadow:
    0 0 6px rgba(56,189,248,0.6),
    0 0 12px rgba(14,165,233,0.4);
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:15px;
  width:100%;
  max-width:400px;
  margin-bottom:40px;
  transition:0.4s; 
}
/*dùng cho khi ẩn hiện days chia lại thành 3 cột*/
.three-columns{
  grid-template-columns:repeat(3, 1fr);
}

.time-box{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:20px;
  text-align:center;
  backdrop-filter:blur(6px);
}

.time-number{
  font-size:32px;
  font-weight:700;
  color:#38bdf8;
}

.time-label{
  font-size:14px;
  opacity:0.7;
  margin-top:5px;
}

.controls{
  width:100%;
  max-width:400px;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border:1px solid #38bdf8;
  border-radius:12px;
  background:#162032;
  color:white;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#1d4ed8;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

button,
div {
  -webkit-tap-highlight-color: transparent;
  }

/* Hiệu ứng nhấp nháy */
@keyframes blink {
  0%   { opacity: 1; }
  50%  { opacity: 0.3; }
  100% { opacity: 1; }
}

/* Khi sắp hết giờ */
.danger-seconds {
  color: #ff4d4d;
  text-shadow: 0 0 8px rgba(255,0,0,0.7);
  animation: blink 0.8s infinite;
}

.progress-wrapper{
  width:100%;
  max-width:400px;
  margin-bottom:30px;
}

.progress{
  width:100%;
  max-width:400px;
  height:8px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:30px;
}

.progress-bar{
  position: relative;
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#38bdf8,#1d4ed8);
  transition:width 0.2s linear;
}

/* Hiển thị % của thanh progress*/
.progress-percent{
  text-align:right;
  font-size:14px;
  font-weight:600;
  margin-bottom:6px;
  color:#38bdf8;
  transition:0.3s;
}

/*Đổi màu khi còn <= 10 giây*/
.progress-bar.danger{
  background:linear-gradient(90deg,#ff4d4d,#b30000,#ff4d4d);
  background-size:200% 100%;
  box-shadow:0 0 12px rgba(255,0,0,0.8);
}

/* Css cho phần thông báo */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

/* Cái này là để hiện ra thông báo nè */
.modal-overlay.active{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:#0f1c3f;
  border-radius:16px;
  padding:25px;
  width:90%;
  max-width:320px;
  text-align:center;
  box-shadow:0 0 20px rgba(56,189,248,0.3);
  animation:pop 0.25s ease;
}

.modal-box h3{
  margin:0 0 10px;
  color:#38bdf8;
}

.modal-box p{
  margin:0 0 20px;
  opacity:0.8;
}

.modal-box button{
  background:#1d4ed8;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* icon đổi màu theo biến */
.modal-icon{
  width:60px;
  height:60px;
  margin:0 auto 15px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:rgba(255,255,255,0.05);
  border:2px solid currentColor;
  color:currentColor;
  box-shadow:0 0 15px currentColor;
}

@keyframes pop{
  from{ transform:scale(0.8); opacity:0; }
  to{ transform:scale(1); opacity:1; }
  }
</style>
</head>

<body>
<div class="header">COUNTDOWN</div>

<div class="main">

  <div class="countdown">
    <div class="time-box">
      <div class="time-number" id="days">0</div>
      <div class="time-label">Ngày</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="hours">0</div>
      <div class="time-label">Giờ</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="minutes">0</div>
      <div class="time-label">Phút</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="seconds">0</div>
      <div class="time-label">Giây</div>
    </div>
  </div>

<!-- Thanh Progress -->
<div class="progress-wrapper">
  <div class="progress-percent" id="progressText">100%</div>
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<!-- khu vực điều khiển -->
  <div class="controls">
    <input type="datetime-local" id="dateInput" step="1">
    <button onclick="startCD()">Bắt đầu</button>
  </div>

</div>

<!-- Khu vực thông báo -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon" id="modalIcon">✔</div>
    <h3 id="modalTitle">Thông báo</h3>
    <p id="modalMessage">Nội dung</p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuBHbln6bqYn9SpwOC2eDke3JJ32nE7vs",
  authDomain: "iunc-login.firebaseapp.com",
  projectId: "iunc-login",
  storageBucket: "iunc-login.firebasestorage.app",
  messagingSenderId: "359473829379",
  appId: "1:359473829379:web:b1102278155f598e316036"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } 
  }
});

    </script>
<script>
const input = document.getElementById("dateInput");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText")
const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");
const modal = document.getElementById("modal");
const modalMessage = document.getElementById("modalMessage");
const modalIcon = document.getElementById("modalIcon");
const modalTitle = document.getElementById("modalTitle");

let interval;
let totalTime;
let startTime;

//Hiện thông báo
function showModal({
  title = "Thông báo",
  message = "",
  icon = "✔",
  color = "#38bdf8"
}) {
  modalTitle.innerText = title;
  modalMessage.innerText = message;
  modalIcon.innerText = icon;
  modalIcon.style.color = color;

  modal.classList.add("active");
}

//Tắt thông báo khi ấn OK
function closeModal(){
  modal.classList.remove("active");
}

//Hiện 2 số 00:00:00
function pad(num){
  return num.toString().padStart(2,"0");
}

/* Hàm startCD dùng để kiểm tra và lưu 
vào localStorage*/
function startCD(laNhanNut = true){
if (interval && laNhanNut) {
  showModal({
    title: "Đang chạy",
    message: "Countdown đang hoạt động rồi!",
    icon: "⚠",
    color: "#facc15"
  });
  return;
}
//Kiểm tra ngày tháng nhập chưa
if (!input.value){
showModal({
  title: "Lỗi",
  message: "Bạn chưa chọn ngày.",
  icon: "⚠",
  color: "#facc15"
});
return;
}
 
/*
const [year, month, day] = input.value.split("-"); // Xoá dấu - giữa ngày tháng năm Vd: 2026-03-03
const target = new Date(
    Number(year),
    Number(month) - 1,// -1 vì tính từ 0
    Number(day),
    0,0,0 // là 0 giờ 0 phút 0 giây
  );
*/ //cái này dùng khi không chọn giờ phút giây được

const target = new Date(input.value).getTime(); // thời gian kết thúc
startTime = Date.now(); //Thời gian bắt đầu

localStorage.setItem("countdown_target",target);
localStorage.setItem("countdown_start", startTime);
/*Lưu vào giá trị người dùng nhập và 
thời gian bắt đầu vào localStorage*/
totalTime = target - startTime; // tổng thời gian 

runCountdown(target);
}

//Hàm chạy coutdown 
function runCountdown(target){
clearInterval(interval); 
/* Xoá interval cũ tránh việc ấn nút 
start nhiều lần làm tăng countdown */
interval = setInterval( function (){

const now = Date.now();
const diff = target - now;

//Tính ra % đểm thêm vào width cho progressBar
let percent = 0;
if(totalTime <= 0){
percent = 0;
}else{
percent = (diff/totalTime)*100;
}
percent = Math.min(Math.max(percent,0),100); 
/*Không cho phần trăm nhỏ hơn 0 hoặc lớn hơn 
  100 tránh vỡ layout (Clamp function)*/
progressBar.style.width = percent + "%";
progressText.innerText = Math.floor(percent) + "%";

if(diff<=0){
clearInterval(interval);
progressBar.style.width = "0%";
daysEl.innerText = 0;
hoursEl.innerText = 0;
minutesEl.innerText = 0;
secondsEl.innerText = 0;
interval = null;
localStorage.removeItem("countdown_target"); //Xoá localStorage
document.title = "🔔 Countdown hoàn thành!";
showModal({
  title: "Hoàn thành",
  message: "Ngày đó đã tới rồi bạn ơi!",
  icon: "✔",
  color: "#38bdf8"
});
return;
}

const motNgay = 86400000;
const motGio = 3600000;
const motPhut = 60000;
const motGiay = 1000;
const days=Math.floor(diff/motNgay);
//ngày thì lấy phần lớn
const hours=Math.floor((diff%motNgay)/motGio);
// lấy phần dư 
const minutes=Math.floor((diff%motGio)/motPhut);
//lấy phần dư
const seconds=Math.floor((diff%motPhut)/motGiay);
//lấy phần dư

//Kiểm tra ngày nếu < 0 thì ẩn đi và chia lại cột 
const grid = document.querySelector(".countdown"); //lấy thẻ đầu tiên là thẻ ngày
if(days > 0){
  daysEl.parentElement.style.display = "block"; // hiện ngày
  grid.classList.remove("three-columns"); // giữ nguyên 2 cột
}else{
  daysEl.parentElement.style.display = "none"; // ẩn ngày
  grid.classList.add("three-columns"); // chuyển sang 3 cột
}

//hiệu ứng nhấp nháy và đổi màu khi còn <= 10 giây
if(days === 0 && hours === 0 && minutes === 0 && seconds <= 10){
secondsEl.classList.add("danger-seconds"); //hiện
progressBar.classList.add("danger");
progressText.style.color = "#ff4d4d";
} 
else{
secondsEl.classList.remove("danger-seconds"); // ẩn
progressBar.classList.remove("danger");
progressText.style.color = "#38bdf8";
}

daysEl.innerText = days;
hoursEl.innerText = pad(hours);
minutesEl.innerText = pad(minutes);
secondsEl.innerText = pad(seconds);

//Sửa title HTML
if(days > 0){
  document.title = "⏳ " + days + "d " + pad(hours) + ":" + pad(minutes) + ":" + pad(seconds) +" còn lại";
}else{
  document.title = "⏳ " + pad(hours) + ":" + pad(minutes) + ":" + pad(seconds) +" còn lại";
}

},200);
}

/* Hàm lấy giá trị lưu trong 
localStorage ra khi reload trang */
window.addEventListener("load", function(){
  const savedTarget = localStorage.getItem("countdown_target"); 
  const savedStart = localStorage.getItem("countdown_start");
//Lấy giá trị trong localStorage ra
  if(savedTarget && savedStart){
    const target = Number(savedTarget);
    startTime = Number(savedStart);
    totalTime = target - startTime;
    //input.value = new Date(target).toISOString().slice(0,16);
    //Dùng ISO sẽ bị lệch múi giờ khi reload
    const d = new Date(target);
    const year = d.getFullYear();
    const month = String(d.getMonth()+1).padStart(2,"0");
    //String để ép kiểu chuỗi giống hàm num.toString()
    const day = String(d.getDate()).padStart(2,"0");
    const hours = String(d.getHours()).padStart(2,"0");
    const minutes = String(d.getMinutes()).padStart(2,"0");
    input.value = `${year}-${month}-${day}T${hours}:${minutes}`;
    //trả lại input dạng như này 2026-03-03T21:20 
    runCountdown(target);
  }
});

//Hàm reload khi vuốt
let viTriBatDauY = 0;  
// Vị trí Y khi bắt đầu chạm
let viTriHienTaiY = 0;    
// Vị trí Y khi đang kéo
let dangVuot = false;      
// Có đang thực hiện vuốt không
// Khi người dùng chạm vào màn hình
window.addEventListener("touchstart", function (e) {
  // Chỉ cho phép vuốt khi đang ở đầu trang
  if (window.scrollY === 0) {
    viTriBatDauY = e.touches[0].clientY;
    /* e là tên sự kiện mình muốn đặt sao cũng được 
       touches[0] là ngón tay đầu tiên
       clientY là vị trí dọc */
    dangVuot = true;
    // dangVuot như công tắc vậy, khi chạm là nó bật
  }
});
// Khi người dùng kéo tay
window.addEventListener("touchmove", function (e) {
  if (!dangVuot) return;
  viTriHienTaiY = e.touches[0].clientY;
  let khoangCachKeo = viTriHienTaiY - viTriBatDauY;
  // Nếu kéo xuống hơn 60px
  if (khoangCachKeo > 60) {
    dangVuot = false;
    location.reload();
  }
});
// Khi người dùng thả tay
window.addEventListener("touchend", function () {
  dangVuot = false;
});

//Hàm này dùng để tự động dừng khi tab bị ẩn
document.addEventListener("visibilitychange", function(){
  if(document.hidden){
    clearInterval(interval);
  }else{
    if(localStorage.getItem("countdown_target")){
      startCD(false);
    }
  }
});
</script>

</body>
</html>
