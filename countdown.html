<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(160deg,#0b1220,#0f1c3f);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* Header */
.header{
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:600;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* Main */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* Countdown grid */
.countdown{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:15px;
  width:100%;
  max-width:400px;
  margin-bottom:40px;
}

.time-box{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:20px;
  text-align:center;
  backdrop-filter:blur(6px);
}

.time-number{
  font-size:32px;
  font-weight:700;
  color:#38bdf8;
}

.time-label{
  font-size:14px;
  opacity:0.7;
  margin-top:5px;
}

/* Controls */
.controls{
  width:100%;
  max-width:400px;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#162032;
  color:white;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#1d4ed8;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}
</style>
</head>

<body>

<div class="header">ĐẾM NGƯỢC</div>

<div class="main">

  <div class="countdown">
    <div class="time-box">
      <div class="time-number" id="days">0</div>
      <div class="time-label">Ngày</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="hours">0</div>
      <div class="time-label">Giờ</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="minutes">0</div>
      <div class="time-label">Phút</div>
    </div>

    <div class="time-box">
      <div class="time-number" id="seconds">0</div>
      <div class="time-label">Giây</div>
    </div>
  </div>

  <div class="controls">
    <input type="date" id="dateInput">
    <button onclick="startCD()">Bắt đầu</button>
  </div>

</div>

<script>
const input = document.getElementById("dateInput");

const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");

let interval;

function startCD(){

  const target = new Date(input.value);

  if(!input.value){
    alert("Chọn ngày nè!");
    return;
  }

  clearInterval(interval);

  interval = setInterval(function(){

    const now = new Date();
    const diff = target - now;

    if(diff <= 0){
      clearInterval(interval);
      daysEl.innerText = 0;
      hoursEl.innerText = 0;
      minutesEl.innerText = 0;
      secondsEl.innerText = 0;
      alert("Bạn đang tận hưởng rồi hè! 🎉");
      return;
    }

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    daysEl.innerText = days;
    hoursEl.innerText = hours;
    minutesEl.innerText = minutes;
    secondsEl.innerText = seconds;

  },1000);
}
</script>

</body>
</html>
