<div class="game">
  <h1>🎯 Guess The Number</h1>
  <p>Đoán số từ 1 đến 100</p>

  <input type="number" id="guessInput" placeholder="Nhập số..." />
  <button id="guessBtn">Đoán</button>

  <p id="message"></p>
  <p>Lượt còn: <span id="attempts">10</span></p>
  <p>Best: <span id="best">--</span></p>

  <button id="resetBtn">Chơi lại</button>
</div>
