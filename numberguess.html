<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <title>🔢 Number Guess</title>
<style>

*{
   margin:0;
   padding:0;
   box-sizing:border-box;
   -webkit-tap-highlight-color: transparent;
}
body{
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100dvh;
  margin:0;
}
.game{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:300px;
  height:auto;
}
input{
  padding:12px;
  width:100%;
  border:none;
  border-radius:12px;
  margin-top:12px;
  font-size:16px;
  outline:none;
  background: rgba(255,255,255,0.2);
  color: white;
  text-align: center;
}
input::placeholder{
  color: rgba(255,255,255,0.8);
}
button{
  margin-top:12px;
  padding:12px;
  width:40%;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background: linear-gradient(135deg, #36d1dc, #5b86e5);
  color:white;
  font-size:16px;
  font-weight: bold;
  transition: all 0.15s ease;
}
button:active{
  transform: scale(0.96);
  box-shadow: 0 3px 10px rgba(0,0,0,0.2) inset;
}
button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}
h1{
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff7eb3, #ffd86b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 15px rgba(255,255,255,0.3);
  letter-spacing: 1px;
  animation: fadeUp 0.6s ease;
}
@keyframes fadeUp{
  from{
    opacity: 0;
    transform: translateY(20px);
  }
  to{
    opacity: 1;
    transform: translateY(0);
  }
}
.subtitle{
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  margin-top: 5px;
}
#message{
  margin-top:15px;
  font-weight:bold;
  min-height:24px;
  transition: all 0.2s ease;
}
#message.success{
  color: #4ade80;
}
#message.hint{
  color: #facc15;
}
#message.error{
  color: #f87171;
}
.info{
  margin-top:10px;
  font-size:14px;
  color: rgba(255,255,255,0.7);
}
.info span{
  color: #ffd86b;
  font-weight: bold;
  font-size: 16px;
}
.shake{
  animation: shake 0.3s;
}
@keyframes shake{
  0%{ transform: translateX(0); }
  25%{ transform: translateX(-5px); }
  50%{ transform: translateX(5px); }
  75%{ transform: translateX(-5px); }
  100%{ transform: translateX(0); }
}
.flash{
  background: rgba(255, 0, 0, 0.2);
}
#menu{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding:25px 20px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:300px;
}
#menu h2{
  font-size:24px;
  font-weight:700;
  margin-bottom:20px;
  background: linear-gradient(135deg, #ffffff, #cbd5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.5px;
}
#menu button{
  display:block;
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  color:white;
}
#menu button:active{
  transform: scale(0.96);
}
#menu button:nth-of-type(1){
  background: linear-gradient(135deg, #56ab2f, #a8e063);
}
#menu button:nth-of-type(2){
  background: linear-gradient(135deg, #36d1dc, #5b86e5);
}
#menu button:nth-of-type(3){
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
}
#menuBtn{
  margin-top:15px;
  width:30%;
  background: rgba(255,255,255,0.2);
}
#backBtn{
  margin-top:15px;
  width:30%;
  background: rgba(255,255,255,0.2);
}
#shopBtn{
  margin-top:15px;
  width:30%;
  background: rgba(255,255,255,0.2);
}
.hidden{
  display:none !important;
}
#range{
  font-size:14px;
  margin-top:10px;
  color:#a5b4fc; /* tím xanh nhẹ */
  font-weight:500;
  letter-spacing:0.3px;
}
#history{
  font-size:13px;
  margin-top:6px;
  color:rgba(255,255,255,0.7);
}
#modeMenu{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding:25px 20px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:300px;
}
#modeMenu h2{
  font-size:24px;
  margin-bottom:20px;
}
#modeMenu button{
  display:block;
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  background: linear-gradient(135deg, #36d1dc, #5b86e5);
  color:white;
}
#aiControls button {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  color: white;
  transition: transform 0.1s ease, filter 0.2s ease;
}
#aiControls button:active {
  transform: scale(0.98);
  filter: brightness(0.9);
}
#aiControls button:nth-of-type(1) {
  background: linear-gradient(135deg, #36d1dc, #5b86e5); 
}
#aiControls button:nth-of-type(2) {
  background: linear-gradient(135deg, #36d1dc, #5b86e5);
}
#aiControls button:nth-of-type(3) {
  background: linear-gradient(135deg, #56ab2f, #a8e063);
}
#aiControls button:nth-of-type(4) {
  background: rgba(255, 255, 255, 0.15);
}
#aiGuess {
  font-size: 24px;
  font-weight: 800;
  margin: 15px 0;
  color: #ffd86b;
  text-shadow: 0 0 10px rgba(255, 216, 107, 0.3);
}
.xp-container {
  margin-top: 15px;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 12px;
}
.progress-bar {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 5px;
}
#xp-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #ffd86b, #ff7eb3);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.popup-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1001;
  opacity: 1;
  transition: opacity 0.3s ease;
}
.popup-content {
  background: linear-gradient(135deg, #2c5364, #203a43);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  color: white;
  width: 280px;
  border: 1px solid rgba(255,255,255,0.2);
  transform: scale(1);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.popup-overlay.hidden {
  display: none;
  opacity: 0;
}
.popup-btn {
  margin-top: 20px;
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  background: #4ade80;
  color: #0f2027;
  font-weight: bold;
  cursor: pointer;
}
.popup-btn:active { transform: scale(0.95); }
.shop-overlay{
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.shop-container {
  width: 300px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 20px;
  max-height: 100vh;
  overflow-y: auto;
}
.shop-container::-webkit-scrollbar {
  width: 4px;
}
.shop-container::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}
.shop-container::-webkit-scrollbar-track {
  background: transparent;
  margin: 10px 0;
}
.shop-title {
  color: #ffd86b;
  margin-bottom: 10px;
}
.inventory-bar {
  background: rgba(0, 0, 0, 0.3);
  padding: 8px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 12px;
  color: #aaa;
}
.shop-item {
  background: rgba(255, 255, 255, 0.1);
  padding: 12px;
  border-radius: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.item-info {
  text-align: left;
}
.item-name {
  font-weight: bold;
  font-size: 14px;
}
.item-desc {
  font-size: 10px;
  color: #ccc;
}
.buy-btn {
  width: 75px;
  margin: 0;
  padding: 6px;
  font-size: 12px;
  color: black;
  font-weight: bold;
  border: none;
  border-radius: 8px;
}
.shield-color { background: #4ade80; }
.freeze-color { background: #60a5fa; }
.magnifier-color { background: #BF5AF2;}
.gameXPDisplay{
  font-size:14px;
  font-weight:700;
  color: white;
  margin:10px 0;
}
.control-group {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 15px;
}
.control-group button {
  flex:1;
  max-width: 33.33%;
  margin: 0 !important;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px:
}
#timerBtn {
  background: rgba(255, 255, 255, 0.1) !important;
  color: #ffd86b;
  cursor: default;
  border: 1px solid rgba(255, 216, 107, 0.2);
}
#timerDisplay {
  font-family: monospace;
  font-size: 16px;
}
.timer-warn {
    color: #ff4d4d !important;
    animation: blink-red 0.5s infinite;
    font-weight: bold;
}
@keyframes blink-red {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}

</style>
</head>

<body>

<div id="modeMenu">
  <h2>MODE</h2>
  <button onclick="selectMode('player')">🧠 Tôi đoán</button>
  <button onclick="selectMode('ai')">🤖 Game đoán</button>
</div>

<div id="menu" style="display:none;">
  <h2>LEVEL</h2>
  <button onclick="startWithLevel('easy')">🐣 Dễ</button>
  <button onclick="startWithLevel('medium')">😎Trung bình</button>
  <button onclick="startWithLevel('hard')">🔥 Khó</button>
</div>

<div class="game" id="game" style="display:none">
 <h1>NUMBER GUESS</h1>
 <div id="playerUI">
  <p class="subtitle" id="subtitle"></p>
  <input type="number" id="guessInput" placeholder="Nhập số..." />
  
  <div class="control-group">
  <button id="magnifierBtn" class="hidden" onclick="useMagnifier()">
    🔍 <span id="invMagnifier">0</span>
  </button>
  <button id="guessBtn">ĐOÁN</button>
  <button id="timerBtn" class="hidden">
    <span id="timerDisplay">59:00</span>
  </button>
</div>

  <p id="message"></p>
  <p id="range"></p>
  <p id="history"></p>
  <p class="info">Lượt còn: <span id="attempts">10</span></p>
<p class="info">Best: <span id="best">--</span></p>

<div class="xp-container">
  <p class="info">Level: <span id="level">1</span></p>
  <p id="player-title" style="font-size: 13px; color: #ffd86b; font-weight: bold; margin:8px 0; letter-spacing: 0.5px;">
    👶 Tân Binh
  </p>
  <div class="progress-bar">
    <div id="xp-fill"></div>
  </div>
  <p id="xp-text" style="font-size: 11px; margin-top: 5px; color: rgba(255,255,255,0.5)">0 / 100 XP</p>
</div>

<button id="menuBtn">Level</button>
<button id="backBtn" onclick="backToMode()">Mode</button>
<button id="shopBtn" onclick="openShop()">Shop</button>

<div id="dailyStatus" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
    <p style="font-size: 13px; color: #aaa; margin: 0;">
        📅 Đã điểm danh: <span id="streakCount" style="color: #ffd86b; font-weight: bold;">0</span> ngày
    </p>
    <p id="badgeDisplay" style="font-size: 12px; margin-top: 5px; display: none;">
         Danh hiệu: 🐝<span style="color: #ffd86b; font-weight: bold;">Ong Mật</span>
    </p>
</div>

</div>

<div id="aiControls" style="display:none;">
  <p id="aiTitle" style="margin: 10px 0; font-size: 14px;"></p>
  <p id="aiGuess"></p>
  <button onclick="tooLow()">🔼 Lớn hơn</button>
  <button onclick="tooHigh()">🔽 Nhỏ hơn</button>
  <button id="correctBtn" onclick="correct()">🎉 Đúng rồi</button>
  <button onclick="backToMode()">Mode</button>
</div>
</div>

<div id="customPopup" class="popup-overlay hidden">
  <div class="popup-content">
    <div id="popupIcon" style="font-size: 50px; margin-bottom: 10px;">🎉</div>
    <h2 id="popupTitle">Thông báo</h2>
    <p id="popupMessage">Nội dung thông báo ở đây.</p>
    <button onclick="closePopup()" class="popup-btn">Đóng</button>
  </div>
</div>

<div id="shopMenu" class="shop-overlay">
  <div class="game shop-container">
    <span onclick="closeShop()" style="position:absolute; top:5px; right:5px; color:#aaa; cursor:pointer; font-size:25px;">×</span>
    <h2 class="shop-title">CỬA HÀNG</h2>
    <div class="gameXPDisplay">Số dư: <span id="gameXPDisplay" style="font-size:14px; color:white">0</span> 💰</div>
    <div class="inventory-bar">
      Túi đồ: 🛡️ <b id="invShield">0</b> | ❄️ <b id="invFreeze">0</b> | 🔍 <b id="invMShop">0</b>
    </div>
    <div class="shop-item">
      <div class="item-info">
        <div class="item-name">🛡️ Khiên</div>
        <div class="item-desc">Chống tụt Level</div>
      </div>
      <button class="buy-btn shield-color" onclick="buyItem('shield', 500)">500 💰</button>
    </div>
    <div class="shop-item">
      <div class="item-info">
        <div class="item-name">❄️ Băng</div>
        <div class="item-desc">Giữ chuỗi streak</div>
      </div>
      <button class="buy-btn freeze-color" onclick="buyItem('freeze', 1500)">1500 💰</button>
    </div>

    <div class="shop-item">
      <div class="item-info">
        <div class="item-name">🔍 Siêu Nhãn</div>
        <div class="item-desc">Định vị mục tiêu</div>
      </div>
      <button class="buy-btn magnifier-color" onclick="buyItem('magnifier', 2000)">2000 💰</button>
    </div>

  </div>
</div>

<script> 

let gameTimer;
let timeLeft;
let playing = false;
let randomNumber;
let attempts;
let gameOver = false;
let aiMin;
let aiMax;
let aiGuess;
let currentXP = parseInt(localStorage.getItem("xp")) || 0;
let currentLevel = parseInt(localStorage.getItem("level")) || 1;
let money = parseInt(localStorage.getItem("money")) || 0;
let bestScore = localStorage.getItem("bestScore");
const bestText = document.getElementById("best");
bestText.textContent = bestScore ? bestScore: "--";

const menuBtn = document.getElementById("menuBtn");
menuBtn.onclick = () => { document.getElementById("menu").style.display = "block";
document.getElementById("game").style.display = "none";
updateMenuLock();
}

const range = document.getElementById("range");
const history = document.getElementById("history")

const aiControls = document.getElementById("aiControls");
const aiGuessText = document.getElementById("aiGuess");
const aiTitle = document.getElementById("aiTitle");
const playerUI = document.getElementById("playerUI");

const input = document.getElementById("guessInput");
input.addEventListener("keydown",function(e){
  if(e.key === "Enter" && !gameOver && input.value){
      letGo();
  }
})
input.addEventListener("input", function(){
  if(gameOver) return;
  btn.disabled = !input.value;
})

const btn = document.getElementById("guessBtn");
const msg = document.getElementById("message");
const attemptsText = document.getElementById("attempts");


let mode = "player";

function selectMode(m){
 mode = m;

document.getElementById("modeMenu").style.display = "none";
if(mode === "player"){
document.getElementById("menu").style.display = "block";
} else{
document.getElementById("game").style.display = "block";
  maxNumber = 100;
  startGame();
}
}

let maxNumber = 100;
let maxAttempts = 10;
let difficult;

function startWithLevel(level){
  if(level === "easy"){
    maxNumber = 50;
    maxAttempts = 10;
    difficult = "easy";
  } else if(level === "medium"){
    maxNumber = 100;
    maxAttempts = 10;
    difficult = "medium";
  } else{
    maxNumber = 200;
    maxAttempts = 8; 
    difficult = "hard";
  }
document.getElementById("menu").style.display = "none";
document.getElementById("game").style.display = "block";
checkDaily();
startGame();
}

let min = 1;
let max = maxNumber;
let historyList = [];

function startGame(){
if(mode === "ai"){
  playerUI.style.display = "none";
  menu.style.display = "none";
  aiControls.style.display = "block";
  aiTitle.textContent = "Nghĩ 1 số từ 1 đến 100, 🤖 tôi sẽ đoán!";
  aiMin = 1;
  aiMax = maxNumber;
  nextGuess();
} else{
  playerUI.style.display = "block";
  aiControls.style.display ="none";
}

document.getElementById("subtitle").textContent = "Đoán số từ 1 đến "+ maxNumber;
  randomNumber = Math.floor(Math.random()*maxNumber)+1;
  attempts = maxAttempts;
  attemptsText.textContent = attempts;
  msg.textContent = "";
  input.value = "";
  msg.classList.add("hidden");
  min = 1;
  max = maxNumber;
  historyList = [];
  range.classList.add("hidden");
  history.classList.add("hidden");
  gameOver = false;
  playing = false;
  btn.disabled = true;
  btn.textContent = "Đoán";
  clearInterval(gameTimer);
  gameTimer = null;
  const baseSeconds = 59*60;
  let reduction = Math.floor((currentLevel - 30)/5);
  timeLeft = Math.max(10, baseSeconds - (reduction)*10);
  updateTimerUI();
}

function updateXPUI(){
  const xpNeeded = 100;
  const progress = (currentXP % xpNeeded);
  document.getElementById("level").textContent = currentLevel;
document.getElementById("xp-fill").style.width = progress + "%";
document.getElementById("xp-text").textContent = `${progress}/${xpNeeded}XP`;

  const titleElement = document.getElementById("player-title");
  titleElement.textContent = getTitle(currentLevel);

const badgeEl = document.getElementById("badgeDisplay");
    if (badgeEl) {
        if (localStorage.getItem("hasBdg100") === "true") {
            badgeEl.style.display = "block";
            badgeEl.innerHTML = "Danh hiệu: 🐘 <b style='color:#ffd86b;'>Voi Bền Bỉ</b>";
        } else if (localStorage.getItem("hasBdg28") === "true") {
            badgeEl.style.display = "block";
            badgeEl.innerHTML = "Danh hiệu: 🐂 <b style='color:#ffd86b;'>Trâu Siêng Năng</b>";
        } else if (localStorage.getItem("hasBdg21") === "true") {
            badgeEl.style.display = "block";
            badgeEl.innerHTML = "Danh hiệu: 🦫 <b style='color:#ffd86b;'>Hải Ly Miệt Mài</b>";
        } else if (localStorage.getItem("hasBdg14") === "true") {
            badgeEl.style.display = "block";
            badgeEl.innerHTML = "Danh hiệu: 🐜 <b style='color:#ffd86b;'>Kiến Cần Cù</b>";
        } else if (localStorage.getItem("hasBdg7") === "true") {
            badgeEl.style.display = "block";
            badgeEl.innerHTML = "Danh hiệu: 🐝 <b style='color:#ffd86b;'>Ong Mật</b>";
        }
  }

const shopXP = document.getElementById("gameXPDisplay");
if(shopXP) shopXP.textContent = money;
const invS = document.getElementById("invShield");
if(invS) invS.textContent = localStorage.getItem("shield") || 0;
const invF = document.getElementById("invFreeze");
if(invF) invF.textContent = localStorage.getItem("freeze") || 0;
const invM = document.getElementById("invMagnifier");
if(invM) invM.textContent = localStorage.getItem("magnifier") || 0;
const invMShop = document.getElementById("invMShop");
if(invMShop) invMShop.textContent = localStorage.getItem("magnifier") || 0;

updateMenuLock();
}

function addXP(){
  const multiplier = (difficult === "easy")?1:(difficult === "medium")?2:5;
  let gainedXP = (attempts + 1) * multiplier * 10;
  currentXP += gainedXP;
  money += gainedXP;
  let newLevel = Math.floor(currentXP/100)+1;
  if(newLevel > currentLevel){
     let oldTitle = getTitle(currentLevel);
     currentLevel = newLevel;
     let newTitle = getTitle(currentLevel);
     if(oldTitle !== newTitle){
         showPopup("DANH HIỆU MỚI",`Bạn đã đạt được danh hiệu: ${newTitle}`,"👑");  
     } else{
     showPopup("LEVEL UP!",`Chúc mừng! Bạn đã đạt được cấp độ ${currentLevel}`,"🚀");
     }
  }
localStorage.setItem("xp",currentXP); localStorage.setItem("level",currentLevel);
localStorage.setItem("money",money);
updateXPUI();
updateUnlock();
return gainedXP;
}

function nextGuess(){
  aiGuess = Math.floor((aiMin + aiMax)/2);
  aiGuessText.innerHTML = `🤖 <span style="color:white; font-size:16px;">Tôi đoán:</span> ${aiGuess}`;
}

function tooLow(){
  aiMin = aiGuess + 1;
  nextGuess();
}

function tooHigh(){
  aiMax = aiGuess - 1;
  nextGuess();
}

function correct(){
 const cBtn = document.getElementById("correctBtn");

 aiGuessText.textContent = "😎 Tôi đoán đúng rồi";
 aiGuessText.style.color = "#4ade80";

 cBtn.textContent = "Chơi lại";
 cBtn.style.background = "linear-gradient(135deg, #ff9a9e, #fecfef)";

 confetti({
    particleCount: 150,
    spread: 70,
    origin: { y: 0.6 }
  });

 cBtn.onclick = ()=>{
  cBtn.textContent = "🎉 Đúng rồi";
  cBtn.style.background = "";
  aiGuessText.style.color = "";
  cBtn.onclick = correct;
  aiMin = 1;
  aiMax = maxNumber;
  nextGuess();
}
}

function backToMode(){
   modeMenu.style.display = "block";
   game.style.display = "none";
}

btn.onclick = letGo;

function getRank(attempts){
  if(attempts >= 7) return "🏆 S";
  if(attempts >= 4) return "🥈 A";
  return "🥉 B";
}

function letGo(){
  if(gameOver){
    startGame();
    return;
  }
  if(!playing){
    playing = true;
    if(currentLevel >= 30 && !gameTimer){
      startTimer();
    }
  }
  if (attempts <= 0) return;
  const guess = Number(input.value);

  if(!input.value){
    showPopup("ERROR!","Nhập số đi nào bạn ơi!","⚠️");
    return;
  }
  if(guess < 1 || guess > maxNumber){
    showPopup("ERROR!",`Vui lòng nhập số từ 1 đến ${maxNumber}!`,"⚠️");
    input.value = "";
    return;
  }

  historyList.push(guess);
  attempts--;
  attemptsText.textContent = attempts;
  msg.className = "";

  let diff = Math.abs(guess - randomNumber);
  let hintText = "";
  if(diff <= 5){
    hintText = "🔥 Rất gần!";
  } else if(diff <= 10){
    hintText = "😮 Gần rồi!";
  } else{
    hintText = "🧊 Còn xa!";
  }

  if(guess === randomNumber){
    let gained = addXP();
    let rank = getRank(attempts);
    msg.innerHTML = `🎉 Chính xác! <br>+${gained}XP <br>Rank:${rank}`;
    msg.classList.add("success");
    clearInterval(gameTimer);
    gameOver = true;
    playing = false;
    btn.textContent = "Chơi tiếp";
    btn.disabled = false;
    input.value = "";
    confetti({
       particleCount: 150,
       spread: 70,
       origin: { y: 0.6 }
    });
    if(!bestScore || attempts > Number(bestScore)){
      localStorage.setItem("bestScore", attempts);
      bestText.textContent = attempts;
    }

  } else if(guess > randomNumber){
    msg.textContent = "🔽 Nhỏ hơn "+ hintText;
    msg.classList.add("hint");
  input.classList.add("shake","flash");
    setTimeout(()=>{
input.classList.remove("shake","flash")
    },300);
    max = guess - 1
  } else {
    msg.textContent = "🔼 Lớn hơn " + hintText;
    msg.classList.add("hint");
  input.classList.add("shake","flash");
    setTimeout(()=>{      input.classList.remove("shake","flash")
    },300);
    min = guess + 1;
  }
  
  if(difficult === "easy"){
    range.classList.remove("hidden");
    history.classList.remove("hidden");
    range.textContent = `Khoảng: ${min} đến ${max}`;
    history.textContent = "Đã đoán: "+ historyList.join(", ");
  } else if(difficult === "medium"){
    history.classList.remove("hidden");
    history.textContent = "Đã đoán: "+ historyList.join(", ");
  }

  if(attempts <= 0 && guess !== randomNumber){
    let shields = localStorage.getItem("shield") || 0;
    if(shields > 0){
      shields--;      localStorage.setItem("shield",shields);
      updateXPUI();
      showPopup("🛡️ ĐÃ DÙNG KHIÊN", "Khiên giúp bạn không bị tụt level","✨");
    } else {
    if(currentLevel > 1){
       currentLevel--;
       currentXP = (currentLevel - 1)*100;
       money -= 50;
       if(money < 0) money = 0;
    } else {
        currentXP = 0;
        money = 0;
      }
  
localStorage.setItem("xp",currentXP);
localStorage.setItem("level",currentLevel);
localStorage.setItem("money",money);
    updateXPUI();
    updateUnlock();
    clearInterval(gameTimer);
    showPopup("THẤT BẠI!",`Bạn đã bị xuống cấp: <span style="color:#ffd86b">${currentLevel}</span> <br> Số đúng là <span style="color:#ffd86b">${randomNumber}</span>`,"💀");
}
    gameOver = true;
    playing = false;
    clearInterval(gameTimer);
    btn.textContent = "Chơi lại";
    btn.disabled = false;
}
  
  input.value = "";
};

function showPopup(title,massage,icon="🔔"){  document.getElementById("popupTitle").innerHTML = `<b style="color:#ffd86b">${title}</b>`;
document.getElementById("popupMessage").innerHTML = massage;
document.getElementById("popupIcon").textContent = icon;

const popup = document.getElementById("customPopup");
popup.classList.remove("hidden");
}

function closePopup(){
document.getElementById("customPopup").classList.add("hidden");

let isTooPro = (currentLevel >= 5 && difficult === "easy") ||  (currentLevel >= 15 && difficult === "medium");

if(isTooPro){   document.getElementById("game").style.display = "none";
document.getElementById("menu").style.display = "block";
updateMenuLock();
}
}

function getTitle(level) {
    if (level >= 30) return "👑 Huyền Thoại Số Học";
    if (level >= 20) return "🧙 Bậc Thầy Tiên Đoán";
    if (level >= 15) return "💎 Thợ Săn Con Số";
    if (level >= 10) return "🔥 Chuyên Gia Đoán Số";
    if (level >= 5)  return "🌟 Người Chơi Hệ Số";
    return "👶 Tân Binh";
}

function updateMenuLock(){
   const easyBtn = document.querySelector("button[onclick*='easy']");
   const medBtn = document.querySelector("button[onclick*='medium']");
   if(currentLevel >= 5 && easyBtn){
       easyBtn.style.opacity = "0.5";
       easyBtn.style.pointerEvents = "none";
       easyBtn.innerHTML = "🔒 Dễ (Locked)";
   } else {
       easyBtn.style.opacity = "1";
       easyBtn.style.pointerEvents = "auto";
       easyBtn.innerHTML = "🐣 Dễ";
     }
   if(currentLevel >= 15 && medBtn){
       medBtn.style.opacity = "0.5";
       medBtn.style.pointerEvents = "none";
       medBtn.innerHTML = "🔒 Trung bình (Locked)";
   } else {
       medBtn.style.opacity = "1";
       medBtn.style.pointerEvents = "auto";
       medBtn.innerHTML = "😎 Trung bình";
     }   
}

function checkDaily(){
  const today = new Date();
  const todayStr = today.toDateString();
  let lastCheckin = localStorage.getItem("lastCheckin");
  let totalDays = parseInt(localStorage.getItem("streakCount")) || 0;
  let streak = parseInt(localStorage.getItem("streak")) || 0;
  if(lastCheckin !== todayStr){
      const yesterday = new Date();
  yesterday.setDate(today.getDate()-1);
      const yesterdayStr = yesterday.toDateString();
      if(lastCheckin === yesterdayStr || lastCheckin === null){
          streak++;
      } else {
         let freeze = parseInt(localStorage.getItem("freeze")) || 0;
         if(freeze > 0){
         freeze--;     localStorage.setItem("freeze",freeze);
         bdgMsg = "<br><span style='color:#60a5fa'>❄️ <b>Đã dùng Băng!</b> Chuỗi của bạn được bảo toàn.</span>";
         } else {
         streak = 1;
         bdgMsg = "<br><span style='color:#ff4a4a'>⚠️ Bạn đã quên điểm danh! Chuỗi quay về ngày 1.</span>"; 
         }
      }

      currentXP += 10;
      money += 10;
      totalDays++;    localStorage.setItem("lastCheckin",todayStr);
localStorage.setItem("streakCount",totalDays);
localStorage.setItem("xp",currentXP);
localStorage.setItem("streak",streak);
localStorage.setItem("money",money);

let bdgMsg = "";
if(streak >= 100){
   bdgMsg += "<br><span style='color:#ffd86b'>Nhận Badge: 🐘<b>Voi Bền Bỉ</b>!</span>";
localStorage.setItem("hasBdg100","true");
} else if(streak >= 28){
   bdgMsg += "<br><span style='color:#ffd86b'>Nhận Badge: 🐂<b>Trâu Siêng Năng</b>!</span>";
localStorage.setItem("hasBdg28","true");
} else if(streak >= 21){
   bdgMsg += "<br><span style='color:#ffd86b'>Nhận Badge: 🦫<b>Hải Ly Miệt Mài</b>!</span>";
localStorage.setItem("hasBdg21","true");
} else if(streak >= 14){
   bdgMsg += "<br><span style='color:#ffd86b'>Nhận Badge: 🐜<b>Kiến Cần Cù</b>!</span>";
localStorage.setItem("hasBdg14","true");
} else if(streak >= 7){
   bdgMsg += "<br><span style='color:#ffd86b'>Nhận Badge: 🐝<b>Ong Mật</b>!</span>";
localStorage.setItem("hasBdg7","true");
} 

updateXPUI();

}
setTimeout(()=>{
   showPopup("QUÀ ĐIỂM DANH",`Ngày thứ <b style="color:#ffd86b">${totalDays}</b> <br>Nhận được <b style="color:#ffd86b">+10XP +10💰</b> <br> Chuỗi: <b style="color:#ffd86b">${streak}</b>${bdgMsg}`, "🎁");
},500);
const streakEl = document.getElementById("streakCount");
if(streakEl) streakEl.textContent = totalDays;
}

function openShop(){
  const shop = document.getElementById("shopMenu");
  if(shop){
  shop.style.display = "flex";
  updateXPUI();
  }
}

function closeShop(){
  const shop = document.getElementById("shopMenu");
  if(shop){
  shop.style.display = "none";
  updateXPUI();
  }
}

function buyItem(item,price){
  if(money < price){
    showPopup("THẤT BẠI","Bạn không đủ XP!","❌");
    return;
  }
  
  money -= price;
  localStorage.setItem("money", money);

  let count = parseInt(localStorage.getItem(item)) || 0;
  localStorage.setItem(item, count+1);

  updateXPUI();

  const itemNames ={
   'shield': "🛡️ Khiên",
   'freeze': "❄️ Băng",
   'magnifier': "🔍 Siêu Nhãn"
  };
  let name = itemNames[item] || "Vật phẩm";
  showPopup("THÀNH CÔNG",`Đã sắm <b style="color:#ffd86b;">${name} <b>`,"💰");
}

function updateUnlock(){
const isUnlock = currentLevel >= 30;
document.getElementById("magnifierBtn").classList.toggle("hidden", !isUnlock);
document.getElementById("timerBtn").classList.toggle("hidden", !isUnlock);
}

function useMagnifier(){
  if(!playing || gameOver){
   showPopup("THÔNG BÁO","Game chưa bắt đầu mà soi gì ba 😱", "🔔");
   return;
  }
  let count = localStorage.getItem("magnifier") || 0;
  if(count <=0 ){
    showPopup("HẾT ĐỒ","Bạn vào cửa hàng để mua thêm Siêu Nhãn","🔍");
    return;
  }
  count--;
localStorage.setItem("magnifier",count);
const invM = document.getElementById("invMagnifier");
if(invM) invM.textContent = count;
let offset = Math.floor(Math.random()*10);
let hMin = randomNumber - offset;
let hMax = hMin + 10;
if(hMin < min){
  hMin = min;
  hMax = hMin + 10;
}
if(hMax > max){
  hMax = max;
  hMin = hMax - 10;
}
msg.style.color = "#ffd86b";
msg.innerHTML = `🔍 Siêu Nhãn: Khoảng ${hMin} đến ${hMax}`;
}

function startTimer(){
  clearInterval(gameTimer);
  const baseSeconds = 59*60;
  let reduction = Math.floor((currentLevel - 30)/5);
  timeLeft = Math.max(10, baseSeconds - (reduction*10));
  updateTimerUI();
  gameTimer = setInterval(()=>{
   timeLeft--;
   updateTimerUI();
   const display = document.getElementById("timerDisplay");
   if(timeLeft <= 10){
     display.classList.add("timer-warn");
   } else {
     display.classList.remove("timer-warn");
   }
   if(timeLeft <= 0){
     clearInterval(gameTimer);
     handleTimeout();
   }
  },1000);
}

function updateTimerUI(){
  let m = Math.floor(timeLeft / 60);
  let s = Math.floor(timeLeft % 60); document.getElementById("timerDisplay").textContent = `${m < 10?'0':''}${m}:${s<10?'0':''}${s}`;
}
 
function handleTimeout(){
  clearInterval(gameTimer);
  gameTimer = null;
  playing = false;
  if(currentLevel > 1){
 currentLevel--; localStorage.setItem("level",currentLevel);
  showPopup("HẾT GIỜ",`Bạn đã quá chậm rồi, bạn bị xuống cấp <b style='color:#ffd86b;'>${currentLevel}</b>`,"⏰");
  document.getElementById("timerDisplay").classList.remove("timer-warn");
  updateXPUI();
  }
startGame();
}

updateXPUI();
updateMenuLock();
updateUnlock();
startGame();

</script>
