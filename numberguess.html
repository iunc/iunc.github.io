<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔢 Number Guess</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.game{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:20px;
  text-align:center;
  color:white;
  width:300px;
}
input{
  padding:10px;
  width:80%;
  border:none;
  border-radius:10px;
  margin-top:10px;
}
button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#ff7eb3;
  color:white;
  user-select:none;
}
button:hover{
  opacity:0.8;
}
</style>
</head>

<body>

<div class="game">
  <h1>Number Guess</h1>
  <p>Đoán số từ 1 đến 100</p>
  <input type="number" id="guessInput" placeholder="Nhập số..." />
  <button id="guessBtn">Đoán</button>
  <p id="message"></p>
  <p>Lượt còn: <span id="attempts">10</span></p>
  <p>Best: <span id="best">--</span></p>
  <button id="resetBtn">Chơi lại</button>
</div>

<script>

let randomNumber;
let attempts;
let bestScore = localStorage.getItem("bestScore");

const input = document.getElementById("guessInput");
const btn = document.getElementById("guessBtn");
const msg = document.getElementById("message");
const attemptsText = document.getElementById("attempts");
const bestText = document.getElementById("best");
const resetBtn = document.getElementById("resetBtn");

bestText.textContent = bestScore ? bestScore : "--";

function startGame(){
  randomNumber = Math.floor(Math.random()*100)+1;
  attempts = 10;
  attemptsText.textContent = attempts;
  msg.textContent = "";
  input.value = "";
}

btn.onclick = ()=>{
  const guess = Number(input.value);

  if(!guess) return;

  attempts--;
  attemptsText.textContent = attempts;

  if(guess === randomNumber){
    msg.textContent = "🎉 Chính xác!";
    
    if(!bestScore || attempts > bestScore){
      localStorage.setItem("bestScore", attempts);
      bestText.textContent = attempts;
    }

  } else if(guess > randomNumber){
    msg.textContent = "🔽 Nhỏ hơn!";
  } else {
    msg.textContent = "🔼 Lớn hơn!";
  }

  if(attempts <= 0 && guess !== randomNumber){
    msg.textContent = "💀 Thua! Số là " + randomNumber;
  }
};

resetBtn.onclick = startGame;

startGame();

</script>

</body>
</html>
