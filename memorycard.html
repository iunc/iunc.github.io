<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Memory Card</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color: transparent;
}
body{
background-color:#1a1c2c;
color: #fff;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.container{
text-align:center;
padding:20px;
border-radius:10px;
background-color:#2b2d42;
box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}
h1{
font-size:2.5rem;
font-weight:800;
margin-bottom:20px;
background:linear-gradient(135deg,#ff0055 0%,#ff5500 50%, #ffcc00 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
filter:drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
}
.score-board{
display:flex;
justify-content:space-around;
align-items:center;
margin-bottom:25px;
padding:15px;
background:#1a1c2c;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0px 4px 15px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.05);
font-size:1rem;
font-weight:bold;
}
#timer{
color:#00f0ff;
text-shadow:0 0 10px rgba(0,240,255,0.5);
font-family:monospace;
font-size:1rem;
}
#score{
color:#ffcc00;
text-shadow:0 0 10px rgba(255,204,0,0.5);
font-family:monospace;
font-size:1rem;
}
.grid{
display:grid;
grid-template-columns:repeat(4,100px);
grid-gap:10px;
}
.card{
width:100px;
height:100px;
background-color:#2e3856;
color:#8a9bbf;
border:2px solid #3f4b7a;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:2.5rem;
cursor: pointer;
font-weight:bold;
box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
}
@media(orientation: portrait){
body{
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}
.container{
transform:rotate(90deg); 
width:100vh;
height:90vw;
display:flex;
justify-content:center;
flex-direction:column;
align-items:center;
border-radius:10px;
}
.score-board{
width:85vw;
display:flex;
justify-content:space-around;
margin-bottom:20px;
}
.grid{
transform: scale(0.9);
}
}

</style>
</head>
<body>

<div class="container">
 <h1>Memory Card</h1>
 <div class="score-board">
 <div>⏱️ Thời gian: <span id="timer">60</span>s</div>
 <div>⭐ Điểm: <span id="score">0</span></div>
 </div>
 <div class="grid">
 </div>
</div>

<script>
const grid = document.querySelector('.grid');
const icons = ['🍎', '🍌', '🍇', '🍓', '🍒', '🍍', '🥝', '🍉'];


let gameCards = [...icons,...icons];


function createBoard(){
grid.innerHTML = "";
gameCards.forEach((icon)=>{
const card = document.createElement('div');
card.classList.add('card');
card.dataset.icon = icon;
card.innerText = '?';
grid.appendChild(card);
});
}


createBoard();
</script>
</body>
</html>
