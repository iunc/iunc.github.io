<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@keyframes slideUp{
  from{
    opacity:0;
    transform:translate(-50%,20px);
  }
  to{
    opacity:1;
    transform:translate(-50%,0);
  }
}

*{
  box-sizing:border-box;
}
  
body{
  margin:0;
  padding:20px;
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}
input,button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
}

input{
  background:#262626;
  color:white;
}

textarea{
  background:#111827;  /* xanh đen */
  color:#e5f3ff;
  min-height:160px;    /* cao hơn */
  font-size:16px;      /* chữ to hơn */
  line-height:1.6;
  border:1px solid #1e3a8a;
}

textarea:focus{
  outline:none;
  border:1px solid #38bdf8;
  box-shadow:0 0 12px #38bdf855;
}

#tags{
  background:#0f172a;
  color:#38bdf8;
  border:1px solid #1e40af;
}

#tags:focus{
  outline:none;
  border:1px solid #38bdf8;
  box-shadow:0 0 8px #38bdf855;
}
  
button{
  background:#3b82f6;
  color:white;
  font-weight:bold;
}
.note{
  background:#1e1e1e;
  padding:15px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #2a2a2a;
  font-family: monospace;
}

.note {
  position: relative;
  transition: transform 0.2s ease;
  touch-action: pan-y;
}

.note {
  background:#1a1a1a;
  border:1px solid #2a2a2a;
  border-radius:14px;
  padding:16px;
  margin-top:12px;
  transition:0.2s;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.note:hover{
  transform:translateY(-2px);
}

.note-text{
  margin-top:6px;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  line-height:1.5;
  font-size:14px;
  color:#e5e5e5;
}
  
small{
  color:#00ffcc;
  font-size:12px;
}
.logout{
  background:#444;
}
.actions{
  margin-top:10px;
  display:flex;
  gap:8px;
}
  
.actions button{
  flex:1;
  padding:6px;
  font-size:12px;
  border-radius:8px;
  opacity:0.7;
  transition:0.2s;
}

.actions button:hover{
  opacity:1;
}
  
.delete{ background:#ef4444; }
.edit{ background:#f59e0b; }
  
.dashboard-title{
  font-family:'Orbitron', sans-serif;
  font-size:32px;             /* to lên */
  letter-spacing:4px;
  color:#38bdf8;
  text-shadow:
    0 0 6px #38bdf8,
    0 0 18px #0ea5e9;
  margin-bottom:30px;
}

.tag-badge{
  display:inline-block;
  background:#111827;
  color:#38bdf8;
  border:1px solid #38bdf855;
  padding:3px 8px;
  font-size:11px;
  border-radius:6px;
  margin-right:6px;
  cursor:pointer;
  font-family:monospace;
}
.tag-badge:hover{
  background:#38bdf822;
}
#undoBar{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translate(-50%,20px);
  opacity:0;
  pointer-events:none;
 /* transition:all 0.25s ease; */
  transition: all 0.2s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
#undoBar.show{
  opacity:1;
  transform:translate(-50%,0);
  pointer-events:auto;
}
#undoProgress{
  position:absolute;
  bottom:0;
  left:0;
  height:3px;
  width:100%;
  background:rgba(255,255,255,0.4);
  transform-origin:left;
}
</style>
</head>
<body>
<h2 class="dashboard-title">IUNC</h2>
<button onclick="location.href='dashboard.html'" 
style="background:#222;margin-bottom:15px;">
← Về Hub
</button>
<input type="text" id="search" placeholder="Tìm kiếm...">
<div id="filterStatus" style="font-size:12px;color:#38bdf8;margin-bottom:8px;"></div>
<textarea id="content" placeholder="Nhập ghi chú..."></textarea>
<input type="text" id="tags" placeholder="tags: dev, idea, bug">
  
<button id="saveBtn">Tạo ghi chú mới</button>
<button onclick="logout()" class="logout">Đăng xuất</button>
<button onclick="window.location.href='trash.html'" 
style="background:transparent;
       border:1px solid #ff4d4f;
       color:#ff4d4f;
       font-weight:600;">
🗑 Thùng rác
</button>
<div id="syncStatus" style="font-size:13px;color:#00ffcc;margin-bottom:10px;">
  🟢 Đã đồng bộ
</div>
<div id="swipeHint" style="
  font-size:12px;
  color:#38bdf8;
  margin-bottom:8px;
  opacity:0.8;
  font-family:monospace;
">
👉 Vuốt trái để xoá • Vuốt phải để ghim
</div>
<div id="notes"></div>
<div id="undoBar" style="
  position:fixed;
  bottom:24px;
  left:50%;
  /*transform:translate(-50%,20px);*/
  background:#2563eb;
  padding:8px 16px;
  border-radius:999px;
  /*opacity:0;
  pointer-events:none;*/
  display:flex;
  align-items:center;
  gap:12px;
  z-index:9999;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  font-family:monospace;
  transition:all 0.25s ease;
">

  <span style="
    font-size:13px;
    color:white;
    line-height:1;
    display:flex;
    align-items:center;
  ">
    Đã xoá
  </span>

  <button id="undoBtn" style="
    all:unset;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    padding:4px 10px;
    border-radius:999px;
    background:white;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
  ">
    Hoàn tác
  </button>
<div id="undoProgress"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  updateDoc,
  onSnapshot,
  serverTimestamp,
  query,
  orderBy,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuBHbln6bqYn9SpwOC2eDke3JJ32nE7vs",
  authDomain: "iunc-login.firebaseapp.com",
  projectId: "iunc-login",
  storageBucket: "iunc-login.firebasestorage.app",
  messagingSenderId: "359473829379",
  appId: "1:359473829379:web:b1102278155f598e316036"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUID = null;
let editingID = null;
let allNotes = [];
let currentTagFilter = null;
let autoSaveTimeout = null;
let isEditingMode = false;
let isSaving = false;
let undoTimeout = null;
let pendingDeleteID = null;


///////
function triggerDelete(id){
 // Nếu đang có 1 undo trước đó → huỷ nó
  if(undoTimeout){
    clearTimeout(undoTimeout);
  }
  pendingDeleteID = id;
  //document.getElementById("undoBar").style.display = "flex";
  document.getElementById("undoBar").classList.add("show");
  undoTimeout = setTimeout(async ()=>{
    if(pendingDeleteID){
      await updateDoc(
        doc(db,"users",currentUID,"notes",pendingDeleteID),
        { deleted:true,
          deletedAt: serverTimestamp()
        }
      );
    }
    //document.getElementById("undoBar").style.display = "none";
    document.getElementById("undoBar").classList.remove("show");
    pendingDeleteID = null;
  }, 3000);
  const bar = document.getElementById("undoProgress");
bar.style.transition = "none";
bar.style.transform = "scaleX(1)";
setTimeout(()=>{
  bar.style.transition = "transform 3s linear";
  bar.style.transform = "scaleX(0)";
},10);
}
///////
 
const contentInput = document.getElementById("content");  
contentInput.addEventListener("input", () => {
  //setStatus(isEditingMode ? "editing" : "typing");
  if(isEditingMode){
  setStatus("editing");
}else{
  setStatus("typing");
  }
  clearTimeout(autoSaveTimeout);
  autoSaveTimeout = setTimeout(async () => {  
    const text = contentInput.value.trim();
const tagsRaw = document.getElementById("tags").value;
const tags = [...new Set(
  tagsRaw
    .split(",")
    .map(t => t.trim())
    .filter(t => t !== "")
)];
if(!text && tags.length === 0) return;
if(isSaving) return;
isSaving = true;
try {
  setStatus("saving");
  if(!editingID){
    const docRef = await addDoc(
      collection(db,"users",currentUID,"notes"),
      {
        text:text,
        createdAt: serverTimestamp(),
        pinned:false,
        tags:tags,
        deleted: false
      }
    );
    editingID = docRef.id;
   // isEditingMode = true;
  }
  else{
    await updateDoc(
      doc(db,"users",currentUID,"notes",editingID),
      {
        text:text,
        tags:tags
      }
    );
  }
  setStatus("done");
}
catch(err){
  console.error("Autosave error:", err);
  setStatus("error");
}
finally{
  isSaving = false;
}
  },1000);
});

document.getElementById("tags").addEventListener("input", () => {
  contentInput.dispatchEvent(new Event("input"));
});
  
const saveBtn = document.getElementById("saveBtn"); 
const syncStatus = document.getElementById("syncStatus");
function setStatus(type){
  if(type==="typing"){
    syncStatus.innerText="✍️ Đang nhập...";
    syncStatus.style.color="#38bdf8";
  }
  else if(type==="editing"){
    syncStatus.innerText="📝 Đang chỉnh sửa...";
    syncStatus.style.color="#f59e0b";
  }
  else if(type==="saving"){
    syncStatus.innerText="🟡 Đang lưu...";
    syncStatus.style.color="#facc15";
  }
  else if(type==="done"){
    syncStatus.innerText="🟢 Đã đồng bộ";
    syncStatus.style.color="#00ff88";
  }
  else if(type==="error"){
    syncStatus.innerText="🔴 Lỗi kết nối";
    syncStatus.style.color="#ef4444";
  }
  }
///////
  
///////
async function cleanupOldTrash(){
  const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;
 //const THIRTY_DAYS = 3 * 60 * 1000; // 1 phút
  const now = Date.now();
  const snapshot = await getDocs(
    collection(db,"users",currentUID,"notes")
  );
  snapshot.forEach(async (docSnap)=>{
    const data = docSnap.data();
    if(data.deleted && data.deletedAt){
      const deletedTime = data.deletedAt.toDate().getTime();
      if(now - deletedTime > THIRTY_DAYS){
        await deleteDoc(doc(db,"users",currentUID,"notes",docSnap.id));
      }
    }
  });
}
////////

////////
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="login.html";
  }else{
    currentUID = user.uid;
    await cleanupOldTrash(); 
    listenNotes();
  }
});
////////


window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href="login.html";
  });
};

  
  saveBtn.addEventListener("click", () => {

  editingID = null;
  isEditingMode = false;

  contentInput.value = "";
  document.getElementById("tags").value = "";

  saveBtn.innerText = "Tạo ghi chú mới";

  setStatus("done");
});

function listenNotes(){
  const q = query(
    collection(db,"users",currentUID,"notes"),
    orderBy("createdAt","desc")
  );

  onSnapshot(q,
    (snapshot)=>{

      allNotes=[];
      
      snapshot.forEach(docSnap=>{
  const data = docSnap.data();

  if(!data.deleted){
    allNotes.push({
      id:docSnap.id,
      ...data
    });
  }
});

      // Nếu đang lọc theo tag thì kiểm tra tag còn tồn tại không
if(currentTagFilter){
  
  const stillExist = allNotes.some(n =>
  n.tags && n.tags.some(t => 
    t.toLowerCase() === currentTagFilter.toLowerCase()
  )
);

  if(!stillExist){
    currentTagFilter = null;
  }
}

// Render đúng theo trạng thái hiện tại
if(currentTagFilter){

  const filtered = allNotes.filter(n =>
  n.tags && n.tags.some(t => 
    t.toLowerCase() === currentTagFilter.toLowerCase()
  )
);
  
  renderNotes(filtered);
}else{
  renderNotes(allNotes);
}
      
      
      setStatus("done");

    },
    (error)=>{
      setStatus("error");
    }
  );
}

function getTagColor(tag){
  let hash = 0;
  for(let i=0;i<tag.length;i++){
    hash = tag.charCodeAt(i) + ((hash<<5)-hash);
  }
  
  const tagColors = [
  "#00ffcc", // cyan neon
  "#00e5ff", // sky neon
  "#ffcc00", // vàng neon
  "#ff6b6b", // đỏ neon
  "#c084fc", // tím neon
  "#00ff88"  // xanh neon
];

  return tagColors[Math.abs(hash) % tagColors.length];
}
  



//function renderNotes
function renderNotes(notes){
  const filterStatus = document.getElementById("filterStatus");

if(currentTagFilter){
  filterStatus.innerText = "Đang lọc theo #" + currentTagFilter + " (bấm lại tag để bỏ lọc)";
}else{
  filterStatus.innerText = "";
}
  const container=document.getElementById("notes");
  container.innerHTML="";
  
  notes.sort((a, b) => {
  if (a.pinned === b.pinned) return 0;
  return a.pinned ? -1 : 1;
});
  
  notes.forEach(note=>{
    const tagsHtml = note.tags
  ? note.tags.map(tag => {

      const color = getTagColor(tag.toLowerCase());
      const isActive =
        currentTagFilter &&
        tag.toLowerCase() === currentTagFilter.toLowerCase();

      return `
        <span 
          class="tag-badge"
          onclick="filterByTag('${tag}')"
          style="
  border:1px solid ${color};
  color:${isActive ? '#0f0f0f' : color};
  background:${isActive ? color : '#111'};
  font-family: monospace;
  font-weight:600;
  text-shadow:${isActive ? 'none' : `0 0 6px ${color}`};
  box-shadow:${isActive ? `0 0 12px ${color}aa` : 'none'};
  transition:0.2s;
"
        >
          #${tag}
        </span>
      `;
    }).join("")
  : "";
    
    const date = note.createdAt?.toDate?.().toLocaleString("vi-VN") || "";

    const div=document.createElement("div");
    div.className="note";

 div.style.background = "#1e1e1e";   // nền code
div.style.border = "1px solid #2a2a2a";
div.style.color = "#d4d4d4";
div.style.fontFamily = "monospace";
if(note.pinned){
  div.style.boxShadow = "0 0 0 1px #00ff88";
}
   
  div.innerHTML=`
  <small>${date}</small>
  <div class="note-text">${note.text}</div>
  <div style="margin-top:6px">${tagsHtml}</div>
  <div class="actions">
    <button class="pin">${note.pinned ? "📌" : "📍"}</button>
    <button class="edit">Sửa</button>
    <button class="delete">Xóa</button>
  </div>
`;

    //div.querySelector(".delete").onclick=()=>deleteNote(note.id);
    const deleteBtn = div.querySelector(".delete");

deleteBtn.onclick = (e) => {
  e.stopPropagation();
  deleteNote(note.id);
};

deleteBtn.addEventListener("touchstart", (e) => {
  e.stopPropagation();
});
  /*  div.querySelector(".edit").onclick=()=>editNote(note.id,note.text); */
   // div.querySelector(".edit").onclick=()=>editNote(note.id,note.text,note.tags || []);
    const editBtn = div.querySelector(".edit");

editBtn.onclick = (e) => {
  e.stopPropagation();   // 🔥 chặn swipe
  editNote(note.id, note.text, note.tags || []);
};

editBtn.addEventListener("touchstart", (e) => {
  e.stopPropagation();   // 🔥 chặn touch lan ra div
});
    div.querySelector(".pin").onclick = async () => {
  await updateDoc(doc(db,"users",currentUID,"notes",note.id),{
    pinned: !note.pinned
  });
};
    div.querySelector(".pin").style.background = note.pinned ? "#00ff88" : "#444";
    
    container.appendChild(div);
    //Vuốt

    let startX = null;
let currentX = 0;
let hasMoved = false;

    div.addEventListener("touchstart", (e) => {

  if (
    e.target.classList.contains("tag-badge") ||
    e.target.closest(".actions")
  ) {
    startX = null;
    return;
  }

  startX = e.touches[0].clientX;
  hasMoved = false;
});
    

    div.addEventListener("touchmove", (e) => {

  if(startX === null) return;

  currentX = e.touches[0].clientX;
  const diff = currentX - startX;

  if(Math.abs(diff) > 20){   // 👈 ngưỡng chống tap nhầm
    hasMoved = true;
    div.style.transform = `translateX(${diff}px)`;
  }

});


    div.addEventListener("touchend", async () => {

  if(startX === null) return;

  const diff = currentX - startX;

  // 👇 Nếu chỉ tap → không xử lý swipe
  if(!hasMoved){
    div.style.transform = "translateX(0)";
    startX = null;
    return;
  }

  document.getElementById("swipeHint")?.remove();

  if (diff < -100) {
  if (navigator.vibrate) navigator.vibrate(30);
  triggerDelete(note.id);
  }
    
  else if (diff > 100) {
    if (navigator.vibrate) navigator.vibrate(30);
    await updateDoc(doc(db,"users",currentUID,"notes",note.id),{
      pinned: !note.pinned
    });
  }

  div.style.transform = "translateX(0)";
  div.style.background = "#1e1e1e";
  startX = null;
});

    //Vuốt
  });
}

window.deleteNote = function(id){
  triggerDelete(id);
};
  
window.editNote = function(id,text,tags){
  editingID=id;
  isEditingMode = true;
  
  contentInput.value=text;

  // 🔥 set lại tag input
  document.getElementById("tags").value = tags.join(", ");
  
  saveBtn.innerText="Cập Nhật";
  contentInput.focus();
  setStatus("editing");
};
  
window.filterByTag = function(tag){

  // Nếu bấm lại cùng tag → bỏ lọc
  if(currentTagFilter === tag){
    currentTagFilter = null;
    renderNotes(allNotes);
    return;
  }

  currentTagFilter = tag;
  
  const filtered = allNotes.filter(n =>
  n.tags && n.tags.some(t => t.toLowerCase() === tag.toLowerCase())
);
  
  renderNotes(filtered);
};
  
document.getElementById("search").addEventListener("input",(e)=>{
  const keyword=e.target.value.toLowerCase();
  const filtered=allNotes.filter(n=>
    n.text.toLowerCase().includes(keyword)
  );
  renderNotes(filtered);
});

document.getElementById("undoBtn").onclick = ()=>{
  if(undoTimeout){
    clearTimeout(undoTimeout);
  }

  document.getElementById("undoBar").classList.remove("show");
  pendingDeleteID = null;
};

  
</script>

</body>
</html>
