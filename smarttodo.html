<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Todo</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    text-align:center;
}

.inputBox{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:12px 16px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{
    text-decoration:line-through;
    opacity:0.6;
}

.deleteBtn{
    background:red;
    padding:6px 10px;
    border-radius:6px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Smart Todo</h1>

<div class="inputBox">
<input id="taskInput" placeholder="Enter task...">
<button id="addBtn">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

const input = document.getElementById("taskInput");
const addBtn = document.getElementById("addBtn");
const taskList = document.getElementById("taskList");

addBtn.addEventListener("click", addTask);

function addTask(){

    const text = input.value.trim();

    if(text === "") return;

    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = text;

    span.addEventListener("click", function(){
        span.classList.toggle("completed");
    });

    const del = document.createElement("button");
    del.textContent = "X";
    del.className = "deleteBtn";

    del.addEventListener("click", function(){
        li.remove();
    });

    li.appendChild(span);
    li.appendChild(del);

    taskList.appendChild(li);

    input.value = "";

}

</script>

</body>
</html>
