<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Todo</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}
.container{
    max-width:500px;
    margin:auto;
}
h1{
    text-align:center;
}
.inputBox{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
input{
    flex:1;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:12px 16px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
}
ul{
    list-style:none;
    padding:0;
}
li{
    background:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.completed{
    text-decoration:line-through;
    opacity:0.6;
}
.deleteBtn{
    background:red;
    padding:6px 10px;
    border-radius:6px;
    font-size:14px;
}
#counter{
    margin-bottom:15px;
    font-size:14px;
    color:#555;
}  
</style>
</head>

<body>

<div class="container">

<h1>Smart Todo</h1>

<div class="inputBox">
<input id="taskInput" placeholder="Enter task...">
<button id="addBtn">Add</button>
</div>

<div id="counter">0 tasks</div>
<ul id="taskList"></ul>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuBHbln6bqYn9SpwOC2eDke3JJ32nE7vs",
  authDomain: "iunc-login.firebaseapp.com",
  projectId: "iunc-login",
  storageBucket: "iunc-login.firebasestorage.app",
  messagingSenderId: "359473829379",
  appId: "1:359473829379:web:b1102278155f598e316036"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } 
});

</script>
    
<script>

const input = document.getElementById("taskInput");
const addBtn = document.getElementById("addBtn");
const taskList = document.getElementById("taskList");
const counter = document.getElementById("counter");
    
addBtn.addEventListener("click", addTask);

input.addEventListener("keydown",function(e){
 if(e.key === "Enter"){
    addTask();
}
});

function addTask(){
    const text = input.value.trim();
    if(text === "") return;
    const li = document.createElement("li");
    const span = document.createElement("span");
    span.textContent = text;
    span.addEventListener("click", function(){
        span.classList.toggle("completed");
    });
    const del = document.createElement("button");
    del.textContent = "X";
    del.className = "deleteBtn";
    del.addEventListener("click", function(){
        li.remove();
        updateCounter();
    });
    li.appendChild(span);
    li.appendChild(del);
    taskList.appendChild(li);
    input.value = "";
    input.focus();
    updateCounter();
}

function updateCounter(){
 const total = taskList.children.length;
 counter.textContent = total + " tasks";
}

</script>

</body>
</html>
