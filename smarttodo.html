<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Todo</title>

<style>

*{
 box-sizing:border-box;
}
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}
.container{
    max-width:500px;
    margin:auto;
}
.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:15px;
}

#toggleTheme{
 font-size:20px;
 background:white;
 border:1px solid #ccc;
 cursor:pointer;
}
h1{
    text-align:center;
    font-size:46px;
    font-weight:700;
    color:#333;
    margin-bottom:25px;
    letter-spacing:1px;
}
.inputBox{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.inputBox input{
    flex:1;
    min-width:0;
}
#priority{
    width:42px;
    padding:8px 2px;
}
select{
    border:1px solid #ccc;
    background:white;
}
input{
    flex:1;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:12px 16px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
}
#searchBtn{
 background:white;
 border:1px solid #ccc;
}
ul{
    list-style:none;
    padding:0;
}
li{
    background:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    align-items:center;
}
li input[type="checkbox"]{
    flex:0 0 auto;
}
li span:first-of-type{
    width:18px;
    text-align:center;
    font-size:18px;
}
li span:nth-child(3){
    flex:1;
}
.completed{
    text-decoration:line-through;
    opacity:0.6;
}
.deleteBtn{
    margin-left:auto;
    background:red;
    padding:3px 7px;
    border-radius:6px;
    font-size:10px;
}
#counter{
    margin-bottom:15px;
    font-size:14px;
    color:#555;
} 
.filters{
    margin:15px 0;
}
#clearCompleted{
    margin-bottom:15px;
}
body.dark{
  background:#121212;
  color:white;
}
body.dark input{
  background:#1e1e1e;
  color:white;
  border:1px solid #444;
}
body.dark li{
  background:#1e1e1e;
}
body.dark button{
  background:#333;
  color:white;
}
body.dark h1{
  color: white;
}
body.dark #searchBtn{
  background:#333;
  border:1px solid #333;
}
body.dark select{
  background:#333;
  border:1px solid #333;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Smart Todo</h1>
  <button id="toggleTheme">🌙</button>
</div>

<div class="inputBox">
<input id="taskInput" placeholder="Enter task..." enterkeyhint="done">
<select id="priority">
  <option value="low">🟢Low</option>
  <option value="medium">🟡Medium</option>
  <option value="high">🔴High</option>
</select>
<button id="addBtn">Add</button>
</div>

<div>
  <button id="searchBtn">🔍</button>
  <input id="searchInput" placeholder="Search task..." />
</div>

<div class="filters">
<button id="filterAll">All</button>
<button id="filterActive">Active</button>
<button id="filterCompleted">Completed</button>
</div>
 
<button id="clearCompleted">Clear Completed</button>

<div id="stats"></div>
  
<ul id="taskList"></ul>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuBHbln6bqYn9SpwOC2eDke3JJ32nE7vs",
  authDomain: "iunc-login.firebaseapp.com",
  projectId: "iunc-login",
  storageBucket: "iunc-login.firebasestorage.app",
  messagingSenderId: "359473829379",
  appId: "1:359473829379:web:b1102278155f598e316036"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } 
});

</script>
    
<script>

const input = document.getElementById("taskInput");
input.addEventListener("keydown",function(e){
 if(e.key === "Enter"){
    addTask();
}
});

const addBtn = document.getElementById("addBtn");
const taskList = document.getElementById("taskList");

const stats = document.getElementById("stats");
function updateStats(){
 const total = tasks.length;
 const active = tasks.filter(t => !t.completed).length;
 const completed = tasks.filter(t => t.completed).length;
 stats.textContent =
  total + " total | " +
  active + " active | " +
  completed + " completed";
}

const prioritySelect = document.getElementById("priority");

const filterAll = document.getElementById("filterAll");
const filterActive = document.getElementById("filterActive");
const filterCompleted = document.getElementById("filterCompleted");

const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", function(){
 renderByFilter();
});

const clearCompleted = document.getElementById("clearCompleted");
clearCompleted.addEventListener("click", function(){
 tasks = tasks.filter(task => !task.completed);
 saveTasks();
 renderByFilter();
 updateStats();
});

const toggleTheme = document.getElementById("toggleTheme");
toggleTheme.addEventListener("click", function(){
document.body.classList.toggle("dark");
const isDark = document.body.classList.contains("dark");
localStorage.setItem("theme", isDark ? "dark" : "light");
});

const savedTheme = localStorage.getItem("theme");
if(savedTheme === "dark"){
 document.body.classList.add("dark");
}

addBtn.addEventListener("click",addTask);

let tasks = [];
let currentFilter = "all";

function addTask(){
  const text = input.value.trim();
  if(!text) return;
  const task = {
     id: Date.now(),
     text: text,
     completed: false,
     priority:prioritySelect.value
  }
  tasks.push(task);
  renderByFilter();

  saveTasks();
  updateStats();

  input.value = "";
  input.focus();
}

function createTask(task){
const li = document.createElement("li");
li.dataset.id = task.id;

const checkbox = document.createElement("input");
checkbox.type = "checkbox";
checkbox.checked = task.completed;

const priority = document.createElement("span")
if(task.priority === "high"){
 priority.textContent = "🔴";
}
if(task.priority === "medium"){
 priority.textContent = "🟡";
}
if(task.priority === "low"){
 priority.textContent = "🟢";
}

const span = document.createElement("span");
 span.textContent = task.text;
 if(task.completed){
     span.classList.add("completed");
 }
 checkbox.addEventListener("change", function(){
  const id = Number(li.dataset.id);
  const task = tasks.find(t => t.id === id);
  
  if(task){
  task.completed = checkbox.checked;
  saveTasks();
  renderByFilter();
  updateStats();
  }
  if(checkbox.checked){
     span.classList.add("completed");
  } else{
    span.classList.remove("completed");
  }
});
span.addEventListener("dblclick",function(){
    editTask(span,li);
});
 const del = document.createElement("button");
 del.textContent = "X";
 del.className = "deleteBtn";
 del.addEventListener("click", function(){
   const id = Number(li.dataset.id);
   const index = tasks.findIndex(t => t.id === id);
   if(index !== -1){
   tasks.splice(index, 1);
   }
   renderByFilter();
   saveTasks();
   updateStats();
});
 li.appendChild(checkbox);
 li.appendChild(span);
 li.appendChild(del);
 taskList.appendChild(li);
}

function renderTasks(list){
 taskList.innerHTML = "";
 list.forEach(task => {
  createTask(task);
 });
 updateStats();
}

filterAll.addEventListener("click", function(){
 currentFilter = "all";
 renderTasks(tasks);
});
filterActive.addEventListener("click", function(){
 currentFilter = "active";
 const active = tasks.filter(task => !task.completed);
 renderTasks(active);
});
filterCompleted.addEventListener("click", function(){
 currentFilter = "completed";
 const done = tasks.filter(task => task.completed);
 renderTasks(done);
});

function renderByFilter(){
 const keyword = searchInput.value.toLowerCase();
 let list = tasks;
 if(currentFilter === "active"){
   list = tasks.filter(task => !task.completed);
 }
 if(currentFilter === "completed"){
   list = tasks.filter(task => task.completed);
 }
 list = list.filter(task => task.text.toLowerCase().includes(keyword)
 );
 renderTasks(list);
}

function saveTasks(){
 localStorage.setItem("tasks", JSON.stringify(tasks));
}

loadTask();
function loadTask(){
   const saved = localStorage.getItem("tasks");
   if(!saved) return;
   tasks = JSON.parse(saved);
   renderTasks(tasks);
   updateStats();
}

function editTask(span, li){
 const oldText = span.textContent;
 const input = document.createElement("input");
 input.type = "text";
 input.value = oldText;
 li.replaceChild(input, span);
 input.focus();
 input.addEventListener("keydown", function(e){
   if(e.key === "Enter"){
      saveEdit();
   }
 });
 input.addEventListener("blur", saveEdit);
 function saveEdit(){
   const newText = input.value.trim();
   if(!newText){
      li.replaceChild(span,input);
      return;
   }
   span.textContent = newText;
   const id = Number(li.dataset.id);
   const task = tasks.find(t => t.id === id);
   if(task){
      task.text = newText;
      saveTasks();
      renderByFilter();
   }
   li.replaceChild(span,input);
 }
}

</script>

</body>
</html>
