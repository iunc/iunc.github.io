<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Todo</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}
.container{
    max-width:500px;
    margin:auto;
}
h1{
    text-align:center;
    font-size:46px;
    font-weight:700;
    color:#333;
    margin-bottom:25px;
    letter-spacing:1px;
}
.inputBox{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
input{
    flex:1;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:12px 16px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
}
ul{
    list-style:none;
    padding:0;
}
li{
    background:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    align-items:center;
}
li input[type="checkbox"]{
    flex:0 0 auto;
}
li span{
    flex:1;
}
.completed{
    text-decoration:line-through;
    opacity:0.6;
}
.deleteBtn{
    margin-left:auto;
    background:red;
    padding:6px 10px;
    border-radius:6px;
    font-size:14px;
}
#counter{
    margin-bottom:15px;
    font-size:14px;
    color:#555;
} 
.filters{
    margin:15px 0;
}
#clearCompleted{
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Smart Todo</h1>

<div class="inputBox">
<input id="taskInput" placeholder="Enter task...">
<button id="addBtn">Add</button>
</div>

<div>
  <button>🔍</button>
  <input id="searchInput" placeholder="Search task..." />
</div>

<div class="filters">
<button id="filterAll">All</button>
<button id="filterActive">Active</button>
<button id="filterCompleted">Completed</button>
</div>

<button id="clearCompleted">Clear Completed</button>
    
<div id="counter">0 tasks</div>
<ul id="taskList"></ul>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuBHbln6bqYn9SpwOC2eDke3JJ32nE7vs",
  authDomain: "iunc-login.firebaseapp.com",
  projectId: "iunc-login",
  storageBucket: "iunc-login.firebasestorage.app",
  messagingSenderId: "359473829379",
  appId: "1:359473829379:web:b1102278155f598e316036"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } 
});

</script>
    
<script>

const input = document.getElementById("taskInput");
const addBtn = document.getElementById("addBtn");
const taskList = document.getElementById("taskList");
const counter = document.getElementById("counter");

const filterAll = document.getElementById("filterAll");
const filterActive = document.getElementById("filterActive");
const filterCompleted = document.getElementById("filterCompleted");
    
const clearCompleted = document.getElementById("clearCompleted");

clearCompleted.addEventListener("click", function(){
 tasks = tasks.filter(task => !task.completed);
 saveTasks();
 renderByFilter();
});

addBtn.addEventListener("click",addTask);

let tasks = [];
let currentFilter = "all";

input.addEventListener("keydown",function(e){
 if(e.key === "Enter"){
    addTask();
}
});

function addTask(){
  const text = input.value.trim();
  if(!text) return;
  const task = {
     id: Date.now(),
     text: text,
     completed: false
  }
  tasks.push(task);
  renderTasks(tasks);

  saveTasks();

  input.value = "";
  input.focus();
 
  updateCounter();
}

function createTask(task){
const li = document.createElement("li");
li.dataset.id = task.id;
const checkbox = document.createElement("input");
checkbox.type = "checkbox";
checkbox.checked = task.completed;
const span = document.createElement("span");
 span.textContent = task.text;
 if(task.completed){
     span.classList.add("completed");
 }
 checkbox.addEventListener("change", function(){
  const id = Number(li.dataset.id);
  const task = tasks.find(t => t.id === id);
  
  if(task){
  task.completed = checkbox.checked;
  saveTasks();
  renderByFilter();
  }
  if(checkbox.checked){
     span.classList.add("completed");
  } else{
    span.classList.remove("completed");
  }
});
span.addEventListener("dblclick",function(){
    editTask(span,li);
});
 const del = document.createElement("button");
 del.textContent = "X";
 del.className = "deleteBtn";
 del.addEventListener("click", function(){
   const id = Number(li.dataset.id);
   const index = tasks.findIndex(t => t.id === id);
   if(index !== -1){
   tasks.splice(index, 1);
   }
   renderByFilter();
   saveTasks();
   updateCounter();
});
 li.appendChild(checkbox);
 li.appendChild(span);
 li.appendChild(del);
 taskList.appendChild(li);
}

function renderTasks(list){
 taskList.innerHTML = "";
 list.forEach(task => {
  createTask(task);
 });
 updateCounter();
}

filterAll.addEventListener("click", function(){
 currentFilter = "all";
 renderTasks(tasks);
});
filterActive.addEventListener("click", function(){
 currentFilter = "active";
 const active = tasks.filter(task => !task.completed);
 renderTasks(active);
});
filterCompleted.addEventListener("click", function(){
 currentFilter = "completed";
 const done = tasks.filter(task => task.completed);
 renderTasks(done);
});

function renderByFilter(){
 const keyword = searchInput.value.toLowerCase();
 let list = tasks;
 if(currentFilter === "active"){
   list = tasks.filter(task => !task.completed);
 }
 if(currentFilter === "completed"){
   list = tasks.filter(task => task.completed);
 }
 list = list.filter(task =>   task.text.toLowerCase().includes(keyword)
 );
 renderTasks(list);
}
    
function updateCounter(){
 const total = taskList.children.length;
 counter.textContent = total + " tasks";
}

function saveTasks(){
 localStorage.setItem("tasks", JSON.stringify(tasks));
}

loadTask();
function loadTask(){
   const saved = localStorage.getItem("tasks");
   if(!saved) return;
   tasks = JSON.parse(saved);
   renderTasks(tasks);
   updateCounter();
}

function editTask(span, li){
 const oldText = span.textContent;
 const input = document.createElement("input");
 input.type = "text";
 input.value = oldText;
 li.replaceChild(input, span);
 input.focus();
 input.addEventListener("keydown", function(e){
   if(e.key === "Enter"){
      saveEdit();
   }
 });
 input.addEventListener("blur", saveEdit);
 function saveEdit(){
   const newText = input.value.trim();
   if(!newText){
      li.replaceChild(span,input);
      return;
   }
   span.textContent = newText;
   const id = Number(li.dataset.id);
   const task = tasks.find(t => t.id === id);
   if(task){
      task.text = newText;
      saveTasks();
   }
   li.replaceChild(span,input);
 }
}

</script>

</body>
</html>
