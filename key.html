<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Két Sắt Cá Nhân</title>
    
    <script src="crypto-js.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;       /* Nền đen xanh */
            --card-bg: #1e293b;        /* Thẻ card */
            --accent: #38bdf8;         /* Màu Sky Blue của bạn */
            --text: #f8fafc;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }

        h2 { text-align: center; color: var(--accent); margin-top: 0; margin-bottom: 1.5rem; }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #0b1120;
            border: 2px solid #334155;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        textarea { height: 120px; resize: none; }

        input:focus, textarea:focus { border-color: var(--accent); outline: none; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save { background: var(--accent); color: #0f172a; }
        .btn-load { background: #cbd5e1; color: #0f172a; }
        .btn-clear { background: var(--danger); color: white; grid-column: span 2; }

        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 Két Sắt</h2>
    <input type="password" id="masterPass" placeholder="Master Password" autocomplete="off">
    <textarea id="content" placeholder="Nội dung mật khẩu..."></textarea>
    
    <div class="btn-group">
        <button class="btn-save" onclick="handleEncrypt()">Mã Hóa</button>
        <button class="btn-load" onclick="handleDecrypt()">Giải Mã</button>
        <button class="btn-clear" onclick="clearAll()">Xóa Sạch (Reset)</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuBHbln6bqYn9SpwOC2eDke3JJ32nE7vs",
  authDomain: "iunc-login.firebaseapp.com",
  projectId: "iunc-login",
  storageBucket: "iunc-login.firebasestorage.app",
  messagingSenderId: "359473829379",
  appId: "1:359473829379:web:b1102278155f598e316036"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.body.style.display = "block";
  }
});

</script>
<script>
    // Logic mã hóa & giải mã
    function handleEncrypt() {
        const pass = document.getElementById('masterPass').value;
        const text = document.getElementById('content').value;
        if(!pass || !text) return alert("Vui lòng nhập Master Password và Nội dung!");
        
        const encrypted = CryptoJS.AES.encrypt(text, pass).toString();
        document.getElementById('content').value = encrypted;
    }

    function handleDecrypt() {
        const pass = document.getElementById('masterPass').value;
        const cipher = document.getElementById('content').value;
        if(!pass || !cipher) return alert("Vui lòng nhập Master Password và chuỗi mã hóa!");

        try {
            const bytes = CryptoJS.AES.decrypt(cipher, pass);
            const original = bytes.toString(CryptoJS.enc.Utf8);
            if(original) {
                document.getElementById('content').value = original;
            } else {
                alert("Sai mật khẩu hoặc dữ liệu đã bị hỏng!");
            }
        } catch(e) { 
            alert("Lỗi giải mã!"); 
        }
    }

    function clearAll() {
        document.getElementById('masterPass').value = '';
        document.getElementById('content').value = '';
    }
</script>
</body>
</html>
