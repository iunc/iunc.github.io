<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://www.gstatic.com; connect-src 'self' https://identitytoolkit.googleapis.com https://*.firebaseio.com;">
    <title>🔐 Két Sắt</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" 
            integrity="sha512-a+SUDuwNzXDvzK3p37z0V4G904R1v9m8d12V2yXQG0E/fQ2h291+C2M4O5F0N2+L0q0N0L0Q==" 
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; --text: #f8fafc; --danger: #ef4444; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { width: 100%; max-width: 400px; background: var(--card-bg); padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--accent); margin-bottom: 1.5rem; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 15px; background: #0b1120; border: 2px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; }
        textarea { height: 150px; resize: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; color: #0f172a; }
        .btn-save { background: var(--accent); }
        .btn-load { background: #cbd5e1; }
        .btn-clear { background: var(--danger); color: white; grid-column: span 2; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 Két Sắt</h2>
    <input type="password" id="masterPass" placeholder="Master Password" autocomplete="off">
    <textarea id="content" placeholder="Nội dung mật khẩu..."></textarea>
    <div class="btn-group">
        <button id="btnSave" class="btn-save">Mã Hóa & Lưu</button>
        <button id="btnLoad" class="btn-load">Tải & Giải Mã</button>
        <button id="btnClear" class="btn-clear">Xóa Sạch</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBuBHbln6bqYn9SpwOC2eDke3JJ32nE7vs",
        authDomain: "iunc-login.firebaseapp.com",
        projectId: "iunc-login",
        databaseURL: "https://iunc-login-default-rtdb.firebaseio.com",
        storageBucket: "iunc-login.firebasestorage.app",
        messagingSenderId: "359473829379",
        appId: "1:359473829379:web:b1102278155f598e316036"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
    });

    // Các hàm logic
    async function saveCloud(data) {
        const user = auth.currentUser;
        if(user) await set(ref(db, 'vaults/' + user.uid), { data: data });
    }

    async function loadCloud() {
        const user = auth.currentUser;
        const snapshot = await get(ref(db, 'vaults/' + user.uid));
        return snapshot.exists() ? snapshot.val().data : null;
    }

    // Gán sự kiện vào nút (thay vì onclick trong HTML)
    document.getElementById('btnSave').onclick = async () => {
        const pass = document.getElementById('masterPass').value;
        const text = document.getElementById('content').value;
        if(!pass || !text) return alert("Nhập mật khẩu và nội dung!");
        const encrypted = CryptoJS.AES.encrypt(text, pass).toString();
        document.getElementById('content').value = encrypted;
        await saveCloud(encrypted);
        alert("Đã lưu!");
    };

    document.getElementById('btnLoad').onclick = async () => {
        const pass = document.getElementById('masterPass').value;
        const cipher = await loadCloud();
        if(!pass || !cipher) return alert("Chưa có dữ liệu!");
        try {
            const bytes = CryptoJS.AES.decrypt(cipher, pass);
            const original = bytes.toString(CryptoJS.enc.Utf8);
            if(original) document.getElementById('content').value = original;
            else alert("Sai mật khẩu!");
        } catch(e) { alert("Lỗi!"); }
    };

    document.getElementById('btnClear').onclick = () => {
        document.getElementById('masterPass').value = '';
        document.getElementById('content').value = '';
    };
</script>
</body>
</html>
