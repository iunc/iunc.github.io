<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-title" content="IUNC Viewer">
<meta name="mobile-web-app-capable" content="yes">
<title>File Viewer</title>
<style>
 body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background-color: #0f0f0f; 
    color: #ffffff;
    margin: 0;
    padding: env(safe-area-inset-top) 15px 20px 15px; 
    overflow-x: hidden;
}
#upload-area {
    background: #1a1a1a;
    border: 2px dashed #333;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    margin-top: 20px;
}
#upload-area:active { 
    background: #252525;
    transform: scale(0.98);
}
.btn-select {
    font-size:50px;
    background: #007bff;
    color: white;
    padding: 12px 25px;
    border-radius: 50px;
    font-weight: bold;
    display: inline-block;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
}
#viewer {
    margin-top: 25px;
    background: #ffffff;
    border-radius: 15px;
    padding: 10px;
    color: #000;
    min-height: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    overflow-x: auto;
}
canvas { 
    max-width: 100% !important; 
    height: auto !important; 
    display: block;
    margin-bottom: 15px;
    border-bottom: 1px solid #eee;
}
table { 
    font-size: 12px; 
    width: 100%;
}
</style>
</head>
<body>

<div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
    <h1 style="font-size: 30px; margin: 0;">IUNC Viewer 📚</h1>
</div>

<div id="upload-area" onclick="document.getElementById('fileInput').click()">
    <div style="font-size: 100px; margin-bottom: 10px;">📂</div>
    <div style="font-size: 30px; color: #aaa;">Chọn file Word, Excel hoặc PDF</div>
    <div class="btn-select">Chọn File</div>
    <input type="file" id="fileInput" hidden accept=".pdf,.docx,.xlsx">
</div>

<div id="viewer-container">
    <div id="viewer">
        <p style="text-align:center; padding-top: 100px; color:#999;">Chưa có dữ liệu để hiển thị</p>
    </div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Mammoth -->
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const input = document.getElementById("fileInput");
const viewer = document.getElementById("viewer");

input.addEventListener("change", async () => {
 const file = input.files[0];
 if (!file) return;

 viewer.innerHTML = "";

 const type = file.name.split(".").pop().toLowerCase();

 if (type === "pdf") {
  const reader = new FileReader();
  reader.onload = async function() {
   const pdf = await pdfjsLib.getDocument({data: reader.result}).promise;
   for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({scale: 1.2});

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    await page.render({canvasContext: ctx, viewport}).promise;
    viewer.appendChild(canvas);
   }
  };
  reader.readAsArrayBuffer(file);
 }

 else if (type === "docx") {
  const reader = new FileReader();
  reader.onload = function() {
   mammoth.convertToHtml({arrayBuffer: reader.result})
    .then(result => {
      viewer.innerHTML = result.value;
    });
  };
  reader.readAsArrayBuffer(file);
 }

 else if (type === "xlsx") {
  const reader = new FileReader();
  reader.onload = function() {
    const data = new Uint8Array(reader.result);
    const workbook = XLSX.read(data, { type: "array" });

    let html = "";

    // 👉 Lặp qua tất cả sheet
    workbook.SheetNames.forEach((name, index) => {
      const sheet = workbook.Sheets[name];

      html += `<h2>Sheet ${index + 1}: ${name}</h2>`;
      html += XLSX.utils.sheet_to_html(sheet);
    });

    viewer.innerHTML = html;
  };
  reader.readAsArrayBuffer(file);
}

 else {
  viewer.innerHTML = "❌ Không hỗ trợ file này";
 }
});


const setEmojiIcon = (emoji) => {
    const canvas = document.createElement('canvas');
    canvas.width = 192;
    canvas.height = 192;
    const ctx = canvas.getContext('2d');

    // 1. Vẽ nền đen bo góc cho xịn (giống icon app thật)
    ctx.fillStyle = '#ffffff'; 
    ctx.roundRect(0, 0, 192, 192, 40); // Bo góc 40px
    ctx.fill();

    // 2. Vẽ Emoji 📚 vào giữa
    ctx.font = '120px serif'; // Hạ size xuống tí để nằm gọn trong nền đen
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, 96, 105); // Nhích xuống tí cho cân mắt

    // 3. Cắm vào link icon
    let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
    link.type = 'image/png';
    link.rel = 'shortcut icon'; // Cho Android
    link.href = canvas.toDataURL('image/png');
    document.getElementsByTagName('head')[0].appendChild(link);
    
    // 4. Thêm cái này cho iPhone nó cũng nhận luôn
    let appleLink = document.querySelector("link[rel='apple-touch-icon']") || document.createElement('link');
    appleLink.rel = 'apple-touch-icon';
    appleLink.href = canvas.toDataURL('image/png');
    document.getElementsByTagName('head')[0].appendChild(appleLink);
  };

  setEmojiIcon('📚');
</script>

</body>
</html>
