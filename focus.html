<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 Focus</title>
<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: #f1f5f9;

  /* nền ảnh mưa đẹp */
  background: url("https://images.unsplash.com/photo-1501696461415-6bd6660c6742")
    no-repeat center center/cover;

  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* lớp phủ tối */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
}

/* blur nhẹ */
.app {
  position: relative;
  z-index: 1;
  text-align: center;

  padding: 30px 20px;
  border-radius: 20px;

  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(8px);
}

/* tiêu đề */
h1 {
  font-size: 16px;
  font-weight: 400;
  opacity: 0.7;
}

/* timer */
#timer {
  font-size: 72px;
  font-weight: 200;
  margin: 20px 0;
  letter-spacing: 3px;
}

/* controls */
.controls {
  display: flex;
  justify-content: center;
  gap: 20px;
}

/* nút */
button {
  background: none;
  border: none;
  color: #e2e8f0;
  font-size: 14px;
  opacity: 0.6;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 1;
}

/* start */
.start {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.5;
}

</style>
</head>
<body>

<div class="app">
  <h1>focus</h1>

  <div id="timer">25:00</div>

  <div class="controls">
    <button onclick="playMusic()">play</button>
    <button onclick="pauseMusic()">pause</button>
  </div>

  <button class="start" onclick="startTimer()">start</button>
</div>

<div id="player"></div>

<script>

let player;
let time = 25 * 60;
let interval;
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);


function onYouTubeIframeAPIReady() {
player = new YT.Player('player', {
height: '0',
width: '0',
videoId: 'BB8cNVJVtaA',
playerVars: { autoplay: 0, controls: 0 }
});
}


function playMusic() {
if (player) player.playVideo();
}


function pauseMusic() {
if (player) player.pauseVideo();
}


function startTimer() {
clearInterval(interval);
interval = setInterval(() => {
time--;
let m = Math.floor(time / 60);
let s = time % 60;   document.getElementById("timer").innerText =`${m}:${s < 10 ? "0" : ""}${s}`;
if (time <= 0) {
clearInterval(interval);
if (player) player.pauseVideo();
}
}, 1000);
}

</script>
</body>
</html>
