<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 Focus</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color: transparent;
}
body{
margin: 0;
height: 100vh;
font-family: "Inter", -apple-system, sans-serif;
color: rgba(255,255,255,0.9);
background:url("https://images.unsplash.com/photo-1495567720989-cebdbdd97913") no-repeat center center/cover;
display: flex;
overflow: hidden;
-webkit-user-select: none;
user-select: none;
}
body::before {
content: "";
position: absolute;
inset: 0;
background: rgba(10, 15, 25, 0.65);
}
.app {
position: fixed;
bottom: 20px;
left: 0;
width: 100%;
z-index: 2;
text-align: center;
}
#timer {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size: 90px;
font-weight: 800;
letter-spacing: 5px;
margin: 20px 0;
-webkit-user-select: text;
user-select: text;
}
.controls {
display: flex;
justify-content: center;
gap: 30px;
}
.control {
display: flex;
align-items: center;
gap: 6px;
font-size: 14px;
letter-spacing: 2px;
color: rgba(255,255,255,0.6);
cursor: pointer;
transition: 0.2s;
}
.control span {
font-size: 16px;
}
#theme-popup {
position: fixed;
bottom: 70px;
left: 50%;
transform: translateX(-50%);
background: rgba(10, 15, 25, 0.9); padding: 15px;
border-radius: 10px;
border: 1px solid rgba(255,255,255,0.1);
z-index: 10;
}
.themes-container {
display: flex;
gap: 20px;
font-size: 14px;
}
.themes-container span {
cursor: pointer;
color: rgba(255, 255, 255, 0.7);
transition: 0.2s;
}
.popup-hidden {
display: none;
}

</style>
</head>
<body>

<div id="timer" contenteditable="true">10:00</div>

<div class="app">
  <div class="controls">
  <div class="control" onclick="playMusic()">
  <span>▶</span> play
  </div>
  <div class="control" onclick="pauseMusic()">
  <span>⏸</span> pause
  </div>
  <div class="control" onclick="startTimer()">
  <span>⏱</span> start
  </div>
  <div class="control" onclick="togglePopup()">
  <span>🎵</span> list
  </div>
  </div>
</div>
  
<div id="player"></div>

<div id="theme-popup" class="popup-hidden">
  <div class="themes-container">
    <span onclick="changeTheme('study')">📚 study</span>
    <span onclick="changeTheme('gym')">💪 gym</span>
    <span onclick="changeTheme('cafe')">☕ cafe</span>
    <span onclick="changeTheme('chill')">🌊 chill</span>
  </div>
</div>

<script>

let player;
let time;
let interval = null;
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);


document.getElementById("timer").addEventListener("keydown",function(e){
if(e.key === "Enter"){
e.preventDefault();
if(interval){
return;
}
this.blur();
}
});


function onYouTubeIframeAPIReady() {
player = new YT.Player('player', {
height: '0',
width: '0',
videoId: 'BB8cNVJVtaA',
playerVars: { autoplay: 0, controls: 0 }
});
}


function playMusic() {
if (player) player.playVideo();
}


function pauseMusic() {
if (player) player.pauseVideo();
}


function startTimer() {
clearInterval(interval);
let timeText = document.getElementById("timer").innerText;
let parts = timeText.split(":");
let minutes = parseInt(parts[0]) || 0;
let seconds = parseInt(parts[1]) || 0;
time = (minutes * 60) + seconds;
interval = setInterval(() => {
if(time <= 0){
clearInterval(interval);
return;
}
time--;
let m = Math.floor(time / 60);
let s = time % 60;   document.getElementById("timer").innerText =`${m<10?"0":""}${m}:${s < 10 ? "0" : ""}${s}`;
if (time <= 0) {
clearInterval(interval);
if (player) player.pauseVideo();
}
}, 1000);
}


function togglePopup(){
let popup = document.getElementById("theme-popup");
if(popup.classList.contains("popup-hidden")){
popup.classList.remove("popup-hidden");
} else {
popup.classList.add("popup-hidden");
}
}


const themes = {
study: {
bg: "https://images.unsplash.com/photo-1434031211128-09549033626c",
musicId: "jfKfPfyJRdk"
},
gym: {
bg: "https://images.unsplash.com/photo-1517838277536-f5f99be501cd",
musicId: "5qxG3f7OOnM"
},
cafe: {
bg: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb",
musicId: "flo26p6S8-8"
},
chill: {
bg: "https://images.unsplash.com/photo-1494232410401-ad00d5433cfa",
musicId: "8DbeoZpM-9k"
}
};


function changeTheme(themeName){
let selectTheme = themes[themeName];
document.body.style.backgroundImage = `url('${selectTheme.bg}')`;
player.loadVideoById(selectTheme.musicId);
}


</script>
</body>
</html>
