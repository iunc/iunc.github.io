<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 Focus</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color: transparent;
}
body{
margin: 0;
height: 100vh;
font-family: "Inter", -apple-system, sans-serif;
color: rgba(255,255,255,0.9);
background:url("https://images.unsplash.com/photo-1495567720989-cebdbdd97913") no-repeat center center/cover;
display: flex;
justify-content: center;
align-items: center;
}
.app {
position: relative;
z-index: 1;
text-align: center;
}
#timer {
font-size: 90px;
font-weight: 200;
letter-spacing: 5px;
margin: 20px 0;
}
.controls {
display: flex;
justify-content: center;
gap: 30px;
}
.control {
display: flex;
align-items: center;
gap: 6px;
font-size: 14px;
letter-spacing: 2px;
color: rgba(255,255,255,0.6);
cursor: pointer;
transition: 0.2s;
}
.control span {
font-size: 16px;
}
.start {
margin-top: 15px;
font-size: 12px;
letter-spacing: 2px;
opacity: 0.4;
cursor: pointer;
}

</style>
</head>
<body>

<div class="app">
  <div id="timer">25:00</div>
  <div class="controls">
  <div class="control" onclick="playMusic()">
  <span>▶</span> play
  </div>
  <div class="control" onclick="pauseMusic()">
  <span>⏸</span> pause
  </div>
  </div>
  <div class="start" onclick="startTimer()">start</div>
</div>
<div id="player"></div>

<script>

let player;
let time = 25 * 60;
let interval;
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);


function onYouTubeIframeAPIReady() {
player = new YT.Player('player', {
height: '0',
width: '0',
videoId: 'BB8cNVJVtaA',
playerVars: { autoplay: 0, controls: 0 }
});
}


function playMusic() {
if (player) player.playVideo();
}


function pauseMusic() {
if (player) player.pauseVideo();
}


function startTimer() {
clearInterval(interval);
interval = setInterval(() => {
time--;
let m = Math.floor(time / 60);
let s = time % 60;   document.getElementById("timer").innerText =`${m}:${s < 10 ? "0" : ""}${s}`;
if (time <= 0) {
clearInterval(interval);
if (player) player.pauseVideo();
}
}, 1000);
}

</script>
</body>
</html>
